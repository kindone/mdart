<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>MdArt Renderer Lab</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { height: 100%; overflow: hidden; }
body {
  height: 100%;
  overflow: hidden;
  background: #1e1e1e; color: #d4d4d4;
  font-family: system-ui, sans-serif;
  display: flex; flex-direction: column;
}

/* ── Toolbar ── */
.toolbar {
  display: flex; align-items: center; gap: 8px;
  height: 44px; padding: 0 12px;
  background: #2d2d2d; border-bottom: 1px solid #3c3c3c;
  flex-shrink: 0; overflow: hidden;
}
.toolbar-title { font-size: 13px; font-weight: 600; color: #cccccc; flex-shrink: 0; }
.toolbar select, .toolbar button {
  height: 28px; border-radius: 4px; font-size: 12px; cursor: pointer; outline: none;
}
.toolbar select {
  background: #3c3c3c; color: #d4d4d4; border: 1px solid #555; padding: 0 8px; min-width: 130px;
}
.toolbar select:hover, .toolbar select:focus { border-color: #007acc; }
.btn-apply {
  background: #007acc; color: #fff; border: none; padding: 0 12px; font-weight: 600;
  display: flex; align-items: center; gap: 4px; white-space: nowrap; flex-shrink: 0;
}
.btn-apply:hover { background: #0098ff; }
.btn-apply:active { background: #005fa3; }
.btn-apply:disabled { background: #555; color: #888; cursor: not-allowed; }
.btn-reset {
  background: transparent; color: #888; border: 1px solid #555; padding: 0 10px; flex-shrink: 0;
}
.btn-reset:hover { background: #3c3c3c; color: #d4d4d4; border-color: #777; }
.sep { flex: 1; min-width: 0; }
.status {
  font-size: 11px; font-family: monospace;
  padding: 3px 8px; border-radius: 3px;
  background: #2d2d2d; border: 1px solid #3c3c3c;
  white-space: nowrap; flex-shrink: 0;
}
.status.idle  { color: #6a9955; border-color: #3c5e3c; }
.status.busy  { color: #dcdcaa; border-color: #5e5e3c; }
.status.ok    { color: #4ec9b0; border-color: #3c5e5a; }
.status.error { color: #f44747; border-color: #5e3c3c; }
.nav-link {
  font-size: 11px; color: #569cd6; text-decoration: none;
  padding: 3px 6px; border-radius: 3px; white-space: nowrap; flex-shrink: 0;
}
.nav-link:hover { background: #3c3c3c; }

/* ── Mobile tab bar ── */
.mobile-tabs {
  display: none;
  background: #252526; border-bottom: 1px solid #3c3c3c; flex-shrink: 0;
}
.mobile-tab {
  flex: 1; height: 38px; background: transparent; color: #858585;
  border: none; border-bottom: 2px solid transparent; cursor: pointer;
  font-size: 13px; font-weight: 500; transition: color .15s;
}
.mobile-tab.active { color: #007acc; border-bottom-color: #007acc; }
.mobile-tab:hover:not(.active) { color: #d4d4d4; }

/* ── Main area ── */
.main {
  flex: 1; display: flex; overflow: hidden; min-height: 0;
}

/* ── Left: Monaco editor ── */
.editor-col {
  position: relative;
  display: flex; flex-direction: column;
  width: 52%; border-right: 1px solid #3c3c3c; flex-shrink: 0;
  overflow: hidden; min-height: 0;
}
.editor-header {
  display: flex; align-items: center; gap: 6px;
  height: 32px; padding: 0 10px; background: #252526; border-bottom: 1px solid #3c3c3c;
  font-size: 11px; color: #858585; flex-shrink: 0; overflow: hidden;
}
.editor-header .filename { color: #d4d4d4; font-weight: 500; font-family: monospace; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.dirty-dot { width: 8px; height: 8px; border-radius: 50%; background: #e5c07b; display: none; flex-shrink: 0; }
.dirty-dot.visible { display: inline-block; }
/* Absolute-position Monaco so it always gets an exact pixel-perfect height,
   free from flex rounding issues that cause the last lines to be unreachable. */
#monaco-container { position: absolute; top: 32px; left: 0; right: 0; bottom: 0; }

/* ── Right col ── */
.right-col { flex: 1; display: flex; flex-direction: column; overflow: hidden; min-width: 0; min-height: 0; }

/* mdart source pane — fixed compact height so preview gets the remaining space */
.source-pane { display: flex; flex-direction: column; flex: 0 0 180px; min-height: 100px; border-bottom: 1px solid #3c3c3c; overflow: hidden; }
.pane-header {
  display: flex; align-items: center; justify-content: space-between;
  height: 28px; padding: 0 10px; background: #252526; border-bottom: 1px solid #3c3c3c;
  font-size: 11px; color: #858585; flex-shrink: 0; gap: 6px;
}
.pane-header select {
  background: #3c3c3c; color: #d4d4d4; border: 1px solid #555;
  border-radius: 3px; font-size: 11px; height: 20px; padding: 0 4px; cursor: pointer;
}
.pane-header select:hover { border-color: #007acc; }
.btn-render-small {
  background: #007acc22; color: #569cd6; border: 1px solid #007acc44;
  border-radius: 3px; font-size: 11px; height: 20px; padding: 0 8px; cursor: pointer;
}
.btn-render-small:hover { background: #007acc44; }
#mdart-source {
  width: 100%; flex: 1; min-height: 0;
  background: #1e1e1e; color: #d4d4d4;
  border: none; outline: none; resize: none;
  font-family: 'Cascadia Code','Fira Code','Consolas',monospace; font-size: 12px;
  line-height: 1.6; padding: 10px 12px; tab-size: 2;
  white-space: pre; overflow-wrap: normal; overflow: auto;
  caret-color: #569cd6;
}
#mdart-source::selection { background: rgba(38,79,120,.6); }

/* Preview pane — takes all remaining height */
.preview-pane { flex: 1; display: flex; flex-direction: column; overflow: hidden; min-height: 0; }
.preview-body {
  flex: 1; overflow: auto; display: flex;
  align-items: flex-start; justify-content: center;
  padding: 16px; background: #1a1a1a;
}
#preview-inner { width: 100%; }
#preview-inner svg { width: 100%; height: auto; display: block; border-radius: 6px; }
.error-box {
  background: #1a0808; border: 1px solid #6e1d1d; border-radius: 6px;
  padding: 14px 16px; font-family: monospace; font-size: 12px; color: #f44747;
  max-width: 560px; white-space: pre-wrap; word-break: break-word; line-height: 1.6;
}
.hint { color: #858585; font-size: 12px; padding: 20px; }

/* ── Loading overlay ── */
#loading-overlay {
  position: fixed; inset: 0; background: #1e1e1e;
  display: flex; align-items: center; justify-content: center;
  flex-direction: column; gap: 12px; z-index: 100;
}
#loading-overlay .loader-text { color: #858585; font-size: 13px; }
.spinner { width: 32px; height: 32px; border: 3px solid #3c3c3c; border-top-color: #007acc; border-radius: 50%; animation: spin .8s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }

/* ── Chat panel ── */
.btn-claude {
  background: #1a1228; color: #c084fc; border: 1px solid #7c3aed44;
  border-radius: 4px; height: 28px; padding: 0 10px; font-size: 12px;
  cursor: pointer; white-space: nowrap; flex-shrink: 0; font-weight: 500;
}
.btn-claude:hover { background: #2d1f50; border-color: #a78bfa; color: #e9d5ff; }
.btn-claude.active { background: #2d1f50; border-color: #a78bfa; color: #e9d5ff; }

.chat-panel {
  position: fixed; top: 0; right: 0; bottom: 0;
  width: 360px; max-width: 90vw;
  background: #1e1e1e; border-left: 1px solid #3c3c3c;
  display: flex; flex-direction: column;
  transform: translateX(100%); transition: transform .22s ease;
  z-index: 200;
  box-shadow: -4px 0 24px rgba(0,0,0,.5);
}
.chat-panel.open { transform: translateX(0); }

.chat-header {
  display: flex; align-items: center; gap: 6px;
  height: 44px; padding: 0 12px;
  background: #252526; border-bottom: 1px solid #3c3c3c; flex-shrink: 0;
}
.chat-header-title { font-size: 13px; font-weight: 600; color: #c084fc; flex: 1; }
.btn-chat-action {
  background: transparent; color: #858585; border: 1px solid #3c3c3c;
  border-radius: 3px; font-size: 11px; height: 24px; padding: 0 8px;
  cursor: pointer; white-space: nowrap;
}
.btn-chat-action:hover { background: #3c3c3c; color: #d4d4d4; }

.chat-messages {
  flex: 1; overflow-y: auto; padding: 12px;
  display: flex; flex-direction: column; gap: 10px; min-height: 0;
}
.chat-msg { display: flex; flex-direction: column; gap: 3px; }
.chat-msg-role {
  font-size: 10px; font-weight: 700; letter-spacing: .06em; text-transform: uppercase;
  padding: 0 2px;
}
.chat-msg.user .chat-msg-role { color: #569cd6; }
.chat-msg.assistant .chat-msg-role { color: #c084fc; }
.chat-msg-body {
  font-size: 13px; line-height: 1.65; color: #d4d4d4;
  background: #252526; border-radius: 6px; padding: 8px 10px;
  word-break: break-word;
}
.chat-msg.user .chat-msg-body { background: #0d1e36; color: #cce5ff; }

/* Markdown inside chat bubbles */
.chat-msg-body p { margin: 0 0 6px; }
.chat-msg-body p:last-child { margin: 0; }
.chat-msg-body code {
  background: #1a1a1a; color: #ce9178; border-radius: 3px;
  padding: 1px 5px; font-family: 'Cascadia Code','Fira Code','Consolas',monospace; font-size: 12px;
}
.chat-msg-body pre {
  background: #141414; border: 1px solid #3c3c3c; border-radius: 5px;
  padding: 10px 12px; overflow-x: auto; margin: 6px 0;
}
.chat-msg-body pre code { background: none; padding: 0; color: #d4d4d4; font-size: 12px; }
.chat-msg-body ul, .chat-msg-body ol { padding-left: 18px; margin: 4px 0; }
.chat-msg-body li { margin: 2px 0; }
.chat-msg-body strong { color: #e2e8f0; }
.chat-msg-body h1,.chat-msg-body h2,.chat-msg-body h3 {
  font-size: 13px; font-weight: 600; color: #e2e8f0; margin: 8px 0 4px;
}
.chat-msg-body table {
  border-collapse: collapse; width: 100%; margin: 6px 0; font-size: 12px;
}
.chat-msg-body th, .chat-msg-body td {
  border: 1px solid #3c3c3c; padding: 5px 10px; text-align: left;
}
.chat-msg-body th {
  background: #2d2d2d; color: #e2e8f0; font-weight: 600;
}
.chat-msg-body tr:nth-child(even) td { background: #252525; }
.chat-typing::after { content: '▋'; animation: blink .8s step-end infinite; color: #c084fc; }
@keyframes blink { 50% { opacity: 0; } }

.chat-empty {
  color: #555; font-size: 12px; text-align: center; padding: 32px 16px; line-height: 1.7;
}
.chat-notice {
  font-size: 11px; color: #4ec9b0; text-align: center;
  padding: 4px 8px; opacity: 0.8;
}

.chat-input-area {
  padding: 10px 12px; background: #252526; border-top: 1px solid #3c3c3c;
  display: flex; flex-direction: column; gap: 8px; flex-shrink: 0;
}
#chat-input {
  width: 100%; background: #1e1e1e; color: #d4d4d4;
  border: 1px solid #3c3c3c; border-radius: 5px;
  font-family: system-ui, sans-serif; font-size: 13px; line-height: 1.5;
  padding: 8px 10px; resize: none; outline: none;
}
#chat-input:focus { border-color: #7c3aed; }
.chat-input-row {
  display: flex; align-items: center; justify-content: space-between; gap: 8px;
}
.chat-ctx-label {
  font-size: 11px; color: #666; display: flex; align-items: center; gap: 5px; cursor: pointer;
  user-select: none;
}
.chat-ctx-label:hover { color: #858585; }
.btn-chat-send {
  background: #7c3aed; color: #fff; border: none;
  border-radius: 4px; height: 28px; padding: 0 14px;
  font-size: 12px; font-weight: 600; cursor: pointer; flex-shrink: 0;
}
.btn-chat-send:hover { background: #8b5cf6; }
.btn-chat-send:disabled { background: #3c3c3c; color: #666; cursor: not-allowed; }

/* ── Mobile overrides (< 768px) ── */
@media (max-width: 767px) {
  /* Show mobile tabs, hide desktop-only hints */
  .mobile-tabs { display: flex; }
  .desktop-only { display: none !important; }

  /* Toolbar: tighter */
  .toolbar { gap: 6px; padding: 0 10px; }
  .toolbar-title { font-size: 12px; }
  #file-select { display: none; }   /* file selection via editor-header on mobile */
  .btn-apply { padding: 0 10px; font-size: 12px; }
  .btn-reset { display: none; }     /* reset via editor-header action on mobile */
  .status { min-width: 0; font-size: 10px; padding: 2px 6px; }

  /* Main: stack panes, one visible at a time */
  .main { position: relative; }

  /* Keep all panes always in the DOM so Monaco never loses its dimensions.
     Use visibility+pointer-events to hide inactive panes instead of display:none. */
  .editor-col {
    position: absolute; inset: 0; width: 100%;
    border-right: none;
    display: flex;
    visibility: hidden; pointer-events: none; z-index: 1;
  }
  .editor-col.mob-active { visibility: visible; pointer-events: auto; z-index: 2; }

  /* right-col becomes a positioning context */
  .right-col {
    position: absolute; inset: 0;
    width: 100%; flex: unset;
  }

  .source-pane {
    position: absolute; inset: 0;
    display: flex; flex: unset; min-height: unset; border-bottom: none;
    visibility: hidden; pointer-events: none; z-index: 1;
  }
  .source-pane.mob-active { visibility: visible; pointer-events: auto; z-index: 2; }

  /* Source textarea fills the pane on mobile */
  #mdart-source { flex: 1; height: unset; font-size: 14px; }

  .preview-pane {
    position: absolute; inset: 0;
    display: flex; flex: unset;
    visibility: hidden; pointer-events: none; z-index: 1;
  }
  .preview-pane.mob-active { visibility: visible; pointer-events: auto; z-index: 2; }

  /* Editor header: show file select inline on mobile */
  .editor-header { height: 40px; }
  #monaco-container { top: 40px; }
  #mobile-file-select { display: block; }

  /* Preview: more padding for mobile */
  .preview-body { padding: 12px; }

  /* Chat panel: full-width on mobile */
  .chat-panel { width: 100%; max-width: 100%; }
}
</style>
</head>

// ── DOM refs ──────────────────────────────────────────────────────────────────
const fileSelect      = document.getElementById('file-select');
const mobileFileSelect= document.getElementById('mobile-file-select');
const btnApply        = document.getElementById('btn-apply');
const btnReset        = document.getElementById('btn-reset');
const btnResetMobile  = document.getElementById('btn-reset-mobile');
const btnRenderOnly   = document.getElementById('btn-render-only');
const exampleSelect   = document.getElementById('example-select');
const mdartSource     = document.getElementById('mdart-source');
const previewInner    = document.getElementById('preview-inner');
const statusEl        = document.getElementById('status');
const editorFilename  = document.getElementById('editor-filename');
const dirtyDot        = document.getElementById('dirty-dot');
const loadingOverlay  = document.getElementById('loading-overlay');

// ── State ─────────────────────────────────────────────────────────────────────
let monacoEditor  = null;
let originalContent = '';
let currentFile   = 'layouts/process/circular-process.ts';
let renderTimer   = null;

// ── Mobile tab switching ──────────────────────────────────────────────────────
const isMobile = () => window.innerWidth < 768;

const paneEls = {
  editor:  document.getElementById('pane-editor'),
  source:  document.getElementById('pane-source'),
  preview: document.getElementById('pane-preview'),
};
const mobileTabs = document.querySelectorAll('.mobile-tab');

function showMobilePane(name) {
  mobileTabs.forEach(b => b.classList.toggle('active', b.dataset.pane === name));
  Object.entries(paneEls).forEach(([k, el]) => el.classList.toggle('mob-active', k === name));
}

mobileTabs.forEach(btn => btn.addEventListener('click', () => showMobilePane(btn.dataset.pane)));

// Init mobile state — default to source tab
if (isMobile()) showMobilePane('source');

// Show/hide mobile-only controls based on viewport
function applyMobileControls() {
  const mob = isMobile();
  mobileFileSelect.style.display  = mob ? 'block' : 'none';
  btnResetMobile.style.display    = mob ? 'block' : 'none';
}
applyMobileControls();
window.addEventListener('resize', applyMobileControls);

// Keep both file selects in sync
function syncFileSelects(file) {
  fileSelect.value       = file;
  mobileFileSelect.value = file;
}

// ── Status helpers ────────────────────────────────────────────────────────────
function setStatus(state, text) {
  statusEl.className = 'status ' + state;
  statusEl.textContent = text;
}

// ── Dirty tracking ────────────────────────────────────────────────────────────
function updateDirty() {
  const isDirty = monacoEditor && monacoEditor.getValue() !== originalContent;
  dirtyDot.classList.toggle('visible', !!isDirty);
}

// ── Load a layout file into Monaco ───────────────────────────────────────────
async function loadFile(file) {
  setStatus('busy', 'loading…');
  try {
    const res  = await fetch('/lab/source?file=' + encodeURIComponent(file));
    const data = await res.json();
    if (data.error) throw new Error(data.error);
    monacoEditor.setValue(data.content);
    originalContent = data.content;
    currentFile = file;
    editorFilename.textContent = file;
    syncFileSelects(file);
    updateDirty();
    setStatus('idle', 'ready');
  } catch (err) {
    setStatus('error', 'load error');
    showError('Failed to load ' + file + ':\n' + err.message);
  }
}

// ── Show SVG / error in preview ──────────────────────────────────────────────
function showSVG(svg) {
  previewInner.innerHTML = svg;
  if (isMobile()) showMobilePane('preview');
}

function showError(msg) {
  previewInner.innerHTML = '<div class="error-box">' + escapeHtml(msg) + '</div>';
}

function escapeHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ── Apply: write + rebuild + render ──────────────────────────────────────────
async function applyAndRender() {
  const code   = monacoEditor.getValue();
  const source = mdartSource.value.trim();
  if (!source) { setStatus('error', 'no source'); return; }
  btnApply.disabled = true;
  setStatus('busy', 'building…');
  try {
    const res  = await fetch('/lab/apply', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ file: currentFile, content: code, mdartSource: source }),
    });
    const data = await res.json();
    if (data.error) throw new Error(data.error);
    showSVG(data.svg);
    originalContent = code;
    updateDirty();
    setStatus('ok', 'ok · ' + data.buildMs + 'ms');
  } catch (err) {
    showError(String(err.message ?? err));
    setStatus('error', 'build error');
  } finally {
    btnApply.disabled = false;
  }
}

// ── Render only (no rebuild) ──────────────────────────────────────────────────
async function renderOnly() {
  const source = mdartSource.value.trim();
  if (!source) return;
  setStatus('busy', 'rendering…');
  try {
    const res  = await fetch('/lab/render', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ mdartSource: source }),
    });
    const data = await res.json();
    if (data.error) throw new Error(data.error);
    previewInner.innerHTML = data.svg;
    setStatus('ok', 'rendered');
  } catch (err) {
    showError(String(err.message ?? err));
    setStatus('error', 'render error');
  }
}

function scheduleRender() {
  if (renderTimer) clearTimeout(renderTimer);
  renderTimer = setTimeout(renderOnly, 350);
}

// ── Wire events ───────────────────────────────────────────────────────────────
async function onFileSelectChange(file) {
  await loadFile(file);
  // Auto-load the matching example into the source pane and refresh preview
  const type = FILE_TO_TYPE[file];
  if (type && EXAMPLES[type]) {
    mdartSource.value = EXAMPLES[type];
    renderOnly();
  }
}

fileSelect.addEventListener('change', () => onFileSelectChange(fileSelect.value));
mobileFileSelect.addEventListener('change', () => onFileSelectChange(mobileFileSelect.value));
btnApply.addEventListener('click', applyAndRender);

function doReset() {
  if (!originalContent) return;
  monacoEditor.setValue(originalContent);
  updateDirty();
  setStatus('idle', 'reset');
}
btnReset.addEventListener('click', doReset);
btnResetMobile.addEventListener('click', doReset);

btnRenderOnly.addEventListener('click', renderOnly);
mdartSource.addEventListener('input', scheduleRender);
mdartSource.addEventListener('keydown', e => {
  if (e.key === 'Tab') {
    e.preventDefault();
    const s = mdartSource.selectionStart;
    mdartSource.value = mdartSource.value.slice(0,s) + '  ' + mdartSource.value.slice(mdartSource.selectionEnd);
    mdartSource.selectionStart = mdartSource.selectionEnd = s + 2;
    scheduleRender();
  }
});

  'class':         'layouts/technical/class.ts',
};

// Reverse map: file path → first diagram type that uses it (for example auto-load)
const FILE_TO_TYPE = {};
for (const [type, file] of Object.entries(TYPE_TO_FILE)) {
  if (!(file in FILE_TO_TYPE)) FILE_TO_TYPE[file] = type;
}

exampleSelect.addEventListener('change', async function() {
  const key = exampleSelect.value;
  if (!key || !EXAMPLES[key]) return;
  exampleSelect.value = key;

  // Load example source
  mdartSource.value = EXAMPLES[key];

  // Auto-switch Monaco to the corresponding renderer file
  const targetFile = TYPE_TO_FILE[key];
  if (targetFile && targetFile !== currentFile) {
    await loadFile(targetFile);
  }

  renderOnly();
});

// ── Monaco init ───────────────────────────────────────────────────────────────
require.config({ paths: { vs: 'https://cdn.jsdelivr.net/npm/monaco-editor@0.55.1/min/vs' } });
require(['vs/editor/editor.main'], async function() {
  monaco.languages.typescript.typescriptDefaults.setCompilerOptions({
    target: monaco.languages.typescript.ScriptTarget.ES2022,
    moduleResolution: monaco.languages.typescript.ModuleResolutionKind.NodeJs,
    allowNonTsExtensions: true,
    noLib: true,
  });
  monaco.languages.typescript.typescriptDefaults.setDiagnosticsOptions({
    noSemanticValidation: true,
    noSyntaxValidation: false,
  });

  monacoEditor = monaco.editor.create(document.getElementById('monaco-container'), {
    language: 'typescript',
    theme: 'vs-dark',
    fontSize: 13,
    lineHeight: 20,
    minimap: { enabled: window.innerWidth >= 1024 },
    scrollBeyondLastLine: false,
    automaticLayout: true,
    tabSize: 2,
    wordWrap: 'off',
    renderLineHighlight: 'gutter',
    bracketPairColorization: { enabled: true },
    accessibilitySupport: 'off',
  });

  monacoEditor.addCommand(
    monaco.KeyMod.CtrlCmd | monaco.KeyCode.Enter,
    applyAndRender
  );
  monacoEditor.onDidChangeModelContent(updateDirty);

  loadingOverlay.style.display = 'none';
  mdartSource.value = EXAMPLES['circular-process'];

  await loadFile('layouts/process/circular-process.ts');
  await renderOnly();
});

// ── Chat panel ────────────────────────────────────────────────────────────────
const CHAT_STORAGE_KEY = 'mdart-lab-chat-history-v1';

let chatStreaming   = false;
let chatHistoryArr = [];

const btnChatToggle  = document.getElementById('btn-chat-toggle');
const chatPanelEl    = document.getElementById('chat-panel');
const chatMessagesEl = document.getElementById('chat-messages');
const chatInputEl    = document.getElementById('chat-input');
const btnChatSend    = document.getElementById('btn-chat-send');
const btnChatClose   = document.getElementById('btn-chat-close');
const btnChatClear   = document.getElementById('btn-chat-clear');
const chatIncludeCtx = document.getElementById('chat-include-ctx');
const chatEmptyEl    = document.getElementById('chat-empty');

// ── Persistence ───────────────────────────────────────────────────────────────
function loadHistory() {
  try { return JSON.parse(localStorage.getItem(CHAT_STORAGE_KEY) || '[]'); } catch { return []; }
}
function saveHistory() {
  try { localStorage.setItem(CHAT_STORAGE_KEY, JSON.stringify(chatHistoryArr.slice(-60))); } catch {}
}
function clearHistory() {
  chatHistoryArr = [];
  localStorage.removeItem(CHAT_STORAGE_KEY);
}

// ── Minimal markdown → HTML ───────────────────────────────────────────────────
function mdToHtml(md) {
  // 1. Protect fenced code blocks
  const blocks = [];
  md = md.replace(/```(\w*)\n?([\s\S]*?)```/g, (_, lang, code) => {
    const i = blocks.push('<pre><code>' + escapeHtml(code.trimEnd()) + '</code></pre>') - 1;
    return '\x00B' + i + '\x00';
  });

  // 2. Inline: code, bold, italic
  const inline = s => s
    .replace(/`([^`\n]+)`/g,       (_, c) => '<code>' + escapeHtml(c) + '</code>')
    .replace(/\*\*([^*\n]+)\*\*/g, '<strong>$1</strong>')
    .replace(/\*([^*\n]+)\*/g,     '<em>$1</em>');

  // 3. Parse table row → array of cell strings
  const tableRow = line => {
    const t = line.trim();
    if (!t.startsWith('|')) return null;
    return t.replace(/^\||\|$/g, '').split('|').map(c => inline(c.trim()));
  };
  const isSeparator = line => /^\|[\s\-:|]+\|/.test(line.trim());

  const lines = md.split('\n');
  const out = [];
  let inUl = false, inOl = false, inTable = false, tableHead = null;

  const closeAll = () => {
    if (inUl)    { out.push('</ul>');   inUl    = false; }
    if (inOl)    { out.push('</ol>');   inOl    = false; }
    if (inTable) { out.push('</tbody></table>'); inTable = false; tableHead = null; }
  };

  for (const line of lines) {
    // Block placeholder
    if (/^\x00B\d+\x00$/.test(line.trim())) {
      closeAll();
      out.push(blocks[parseInt(line.trim().slice(2, -1))]);
      continue;
    }
    // Separator line (|---|---| etc.) — marks previous row as header
    if (isSeparator(line)) {
      if (inTable && tableHead === null) {
        // Promote last <tr> to thead
        const lastTr = out.lastIndexOf(out.find((v, i, a) => i === a.length - 1 && v.startsWith('<tr>')));
        // find the last <tr> we pushed
        for (let i = out.length - 1; i >= 0; i--) {
          if (out[i].startsWith('<tr>')) {
            out[i] = '<thead>' + out[i].replace(/<td>/g, '<th>').replace(/<\/td>/g, '</th>') + '</thead><tbody>';
            tableHead = true;
            break;
          }
        }
      }
      continue;
    }
    // Table row
    const cells = tableRow(line);
    if (cells) {
      if (!inTable) { closeAll(); out.push('<table>'); inTable = true; }
      out.push('<tr>' + cells.map(c => `<td>${c}</td>`).join('') + '</tr>');
      continue;
    }
    // Heading
    const hm = line.match(/^(#{1,3})\s+(.*)/);
    if (hm) {
      closeAll();
      out.push(`<h${hm[1].length}>${inline(hm[2])}</h${hm[1].length}>`);
      continue;
    }
    // Unordered list
    const ulm = line.match(/^[-*]\s+(.*)/);
    if (ulm) {
      if (inOl)    { out.push('</ol>'); inOl = false; }
      if (inTable) { closeAll(); }
      if (!inUl)   { out.push('<ul>'); inUl = true; }
      out.push(`<li>${inline(ulm[1])}</li>`);
      continue;
    }
    // Ordered list
    const olm = line.match(/^\d+\.\s+(.*)/);
    if (olm) {
      if (inUl)    { out.push('</ul>'); inUl = false; }
      if (inTable) { closeAll(); }
      if (!inOl)   { out.push('<ol>'); inOl = true; }
      out.push(`<li>${inline(olm[1])}</li>`);
      continue;
    }
    // Blank line
    if (line.trim() === '') { closeAll(); continue; }
    // Paragraph
    closeAll();
    out.push(`<p>${inline(line)}</p>`);
  }
  closeAll();

  return out.join('\n').replace(/\x00B(\d+)\x00/g, (_, i) => blocks[parseInt(i)]);
}

// ── Message rendering ─────────────────────────────────────────────────────────
function renderAllMessages() {
  chatMessagesEl.innerHTML = '';
  if (!chatHistoryArr.length) {
    chatMessagesEl.appendChild(chatEmptyEl);
    return;
  }
  for (const m of chatHistoryArr) appendMessageEl(m.role, m.content, false);
  chatMessagesEl.scrollTop = chatMessagesEl.scrollHeight;
}

function appendNotice(text) {
  const el = document.createElement('div');
  el.className = 'chat-notice';
  el.textContent = text;
  chatMessagesEl.appendChild(el);
  chatMessagesEl.scrollTop = chatMessagesEl.scrollHeight;
}

function appendMessageEl(role, content, scroll = true) {
  chatEmptyEl.remove();                          // remove empty hint if present
  const wrap = document.createElement('div');
  wrap.className = 'chat-msg ' + role;
  const lbl = document.createElement('div');
  lbl.className = 'chat-msg-role';
  lbl.textContent = role === 'user' ? 'You' : 'Claude';
  const body = document.createElement('div');
  body.className = 'chat-msg-body';
  if (role === 'assistant') body.innerHTML = mdToHtml(content);
  else body.textContent = content;
  wrap.appendChild(lbl);
  wrap.appendChild(body);
  chatMessagesEl.appendChild(wrap);
  if (scroll) chatMessagesEl.scrollTop = chatMessagesEl.scrollHeight;
  return body;
}

// ── Send ──────────────────────────────────────────────────────────────────────
async function sendChat() {
  const text = chatInputEl.value.trim();
  if (!text || chatStreaming) return;

  chatInputEl.value = '';
  chatStreaming = true;
  btnChatSend.disabled = true;

  // Build optional context snippet
  let context = '';
  if (chatIncludeCtx.checked) {
    const src = mdartSource.value.trim();
    context = `Current renderer file: ${currentFile}\n\nCurrent mdart source:\n\`\`\`\n${src}\n\`\`\``;
  }

  // Persist + show user message
  chatHistoryArr.push({ role: 'user', content: text });
  saveHistory();
  appendMessageEl('user', text);

  // Streaming assistant message placeholder
  const wrap = document.createElement('div');
  wrap.className = 'chat-msg assistant';
  const lbl = document.createElement('div');
  lbl.className = 'chat-msg-role';
  lbl.textContent = 'Claude';
  const body = document.createElement('div');
  body.className = 'chat-msg-body';
  body.innerHTML = '<span class="chat-typing"></span>';
  wrap.appendChild(lbl); wrap.appendChild(body);
  chatMessagesEl.appendChild(wrap);
  chatMessagesEl.scrollTop = chatMessagesEl.scrollHeight;

  let accumulated = '';
  let errMsg = '';

  try {
    const resp = await fetch('/lab/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ message: text, context }),
    });
    if (!resp.ok || !resp.body) throw new Error('HTTP ' + resp.status);

    const reader  = resp.body.getReader();
    const decoder = new TextDecoder();
    let buf = '';

    outer: while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      buf += decoder.decode(value, { stream: true });

      // Split on double-newline SSE frame boundary
      let boundary;
      while ((boundary = buf.indexOf('\n\n')) !== -1) {
        const frame = buf.slice(0, boundary);
        buf = buf.slice(boundary + 2);
        if (!frame.trim()) continue;

        const evtMatch  = frame.match(/^event:\s*(.+)/m);
        const dataMatch = frame.match(/^data:\s*(.+)/m);
        if (!dataMatch) continue;

        const evt = evtMatch ? evtMatch[1].trim() : 'chunk';
        let payload;
        try { payload = JSON.parse(dataMatch[1].trim()); } catch { continue; }

        if (evt === 'chunk') {
          // Claude CLI wraps Anthropic API events in { type: 'stream_event', event: {...} }
          const ev = payload.type === 'stream_event' ? payload.event : payload
          if (ev && ev.type === 'content_block_delta' && ev.delta?.type === 'text_delta') {
            accumulated += ev.delta.text ?? ''
            body.innerHTML = mdToHtml(accumulated) + '<span class="chat-typing"></span>';
            chatMessagesEl.scrollTop = chatMessagesEl.scrollHeight;
          }
        } else if (evt === 'error') {
          errMsg = payload.message ?? 'Unknown error';
          break outer;
        }
        // 'done' event: stream will naturally end
      }
    }
  } catch (e) {
    errMsg = e.message ?? String(e);
  }

  // Finalise bubble
  const finalContent = accumulated || (errMsg ? `⚠ ${errMsg}` : '(no response)');
  body.innerHTML = mdToHtml(finalContent);

  chatHistoryArr.push({ role: 'assistant', content: finalContent });
  saveHistory();

  chatStreaming = false;
  btnChatSend.disabled = false;
  chatInputEl.focus();

  // Sync Monaco with disk — Claude may have edited the current file via its tools.
  // Reloading ensures Apply/Reset operate on Claude's version, not the stale snapshot.
  try {
    const prevContent = monacoEditor ? monacoEditor.getValue() : '';
    await loadFile(currentFile);
    const newContent  = monacoEditor ? monacoEditor.getValue() : '';
    if (newContent !== prevContent) {
      // File was changed on disk — show a notice in the chat and re-render
      appendNotice('↻ File updated on disk — Monaco reloaded');
      await renderOnly();
    }
  } catch { /* non-fatal */ }
}

// ── Panel open/close ──────────────────────────────────────────────────────────
function openChat()  { chatPanelEl.classList.add('open');  btnChatToggle.classList.add('active'); chatInputEl.focus(); }
function closeChat() { chatPanelEl.classList.remove('open'); btnChatToggle.classList.remove('active'); }

btnChatToggle.addEventListener('click', () =>
  chatPanelEl.classList.contains('open') ? closeChat() : openChat()
);
btnChatClose.addEventListener('click', closeChat);

btnChatClear.addEventListener('click', async () => {
  if (chatStreaming) return;
  clearHistory();
  chatMessagesEl.innerHTML = '';
  chatMessagesEl.appendChild(chatEmptyEl);
  await fetch('/lab/chat/session', { method: 'DELETE' }).catch(() => {});
});

btnChatSend.addEventListener('click', sendChat);
chatInputEl.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendChat(); }
});

// Ctrl+Shift+K opens/closes chat from anywhere
document.addEventListener('keydown', e => {
  if ((e.ctrlKey || e.metaKey) && e.shiftKey && e.key === 'K') {
    e.preventDefault();
    if (btnChatToggle.style.display !== 'none') {
      chatPanelEl.classList.contains('open') ? closeChat() : openChat();
    }
  }
});

// ── Availability check ────────────────────────────────────────────────────────
(async function initChatPanel() {
  try {
    const r = await fetch('/lab/chat/status');
    const d = await r.json();
    if (d.available) {
      btnChatToggle.style.display = '';
      chatHistoryArr = loadHistory();
      renderAllMessages();
    }
  } catch {}
})();
</script>
</body>
</html>
