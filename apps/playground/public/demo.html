<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>MdArt Demo</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { height: 100%; overflow: hidden; }
body {
  height: 100%; overflow: hidden;
  background: #1e1e1e; color: #d4d4d4;
  font-family: system-ui, sans-serif;
  display: flex; flex-direction: column;
}

/* ── Toolbar ── */
.toolbar {
  display: flex; align-items: center; gap: 6px;
  height: 44px; padding: 0 12px;
  background: #2d2d2d; border-bottom: 1px solid #3c3c3c;
  flex-shrink: 0; overflow: hidden;
}
.toolbar-logo { font-size: 14px; font-weight: 700; color: #d4d4d4; flex-shrink: 0; letter-spacing: -.3px; }
.toolbar-logo span { color: #007acc; }

/* Mode toggle pill */
.mode-toggle {
  display: flex; gap: 1px;
  background: #3c3c3c; border: 1px solid #555;
  border-radius: 5px; padding: 2px; flex-shrink: 0;
}
.mode-btn {
  height: 24px; padding: 0 10px; border: none; border-radius: 3px;
  background: transparent; color: #888; font-size: 12px; font-weight: 500;
  cursor: pointer; white-space: nowrap; transition: color .1s;
}
.mode-btn:hover { color: #d4d4d4; }
.mode-btn.active { background: #007acc; color: #fff; }

/* Mode-specific controls */
.ctrl-group { display: flex; align-items: center; gap: 5px; flex-shrink: 0; }
.ctrl-group.hidden { display: none; }
.hidden { display: none !important; }

.toolbar select {
  height: 28px; border-radius: 4px; font-size: 12px; cursor: pointer; outline: none;
  background: #3c3c3c; color: #d4d4d4; border: 1px solid #555; padding: 0 8px;
}
.toolbar select:hover, .toolbar select:focus { border-color: #007acc; }

.btn {
  height: 28px; border-radius: 4px; font-size: 12px; cursor: pointer;
  outline: none; border: 1px solid #555; padding: 0 10px; white-space: nowrap;
}
.btn-primary { background: #007acc; color: #fff; border-color: #007acc; font-weight: 600; }
.btn-primary:hover { background: #0098ff; }
.btn-primary:disabled { background: #555; color: #888; cursor: not-allowed; }
.btn-ghost { background: transparent; color: #888; }
.btn-ghost:hover { background: #3c3c3c; color: #d4d4d4; border-color: #777; }
.btn-claude {
  background: #1a1228; color: #c084fc; border: 1px solid #7c3aed44;
  border-radius: 4px; height: 28px; padding: 0 10px; font-size: 12px;
  font-weight: 500; cursor: pointer; white-space: nowrap; flex-shrink: 0;
}
.btn-claude:hover { background: #2d1f50; border-color: #a78bfa; color: #e9d5ff; }
.btn-claude.active { background: #2d1f50; border-color: #a78bfa; color: #e9d5ff; }

.sep { flex: 1; min-width: 0; }

.dirty-dot {
  width: 8px; height: 8px; border-radius: 50%; background: #e5c07b;
  display: none; flex-shrink: 0; margin-left: 2px;
}
.dirty-dot.visible { display: inline-block; }

.status-badge {
  font-size: 11px; font-family: monospace;
  padding: 3px 8px; border-radius: 3px;
  background: #2d2d2d; border: 1px solid #3c3c3c;
  white-space: nowrap; flex-shrink: 0;
}
.status-badge.idle  { color: #6a9955; border-color: #3c5e3c; }
.status-badge.busy  { color: #dcdcaa; border-color: #5e5e3c; }
.status-badge.ok    { color: #4ec9b0; border-color: #3c5e5a; }
.status-badge.error { color: #f44747; border-color: #5e3c3c; }

.nav-link {
  font-size: 11px; color: #569cd6; text-decoration: none;
  padding: 3px 6px; border-radius: 3px; white-space: nowrap; flex-shrink: 0;
}
.nav-link:hover { background: #3c3c3c; }

.btn-auto {
  height: 28px; padding: 0 9px; border-radius: 4px; font-size: 11px;
  cursor: pointer; outline: none; white-space: nowrap; flex-shrink: 0;
  background: transparent; color: #666; border: 1px solid #444;
  transition: color .1s, border-color .1s;
}
.btn-auto:hover { color: #aaa; border-color: #666; }
.btn-auto.on { color: #4ec9b0; border-color: #3c5e5a; background: #1a2e2c; }
#btn-save-example { color: #e5c07b; border-color: #5e5220; }
#btn-save-example:hover { background: #2d2510; border-color: #e5c07b; }

/* ── Mobile tab bar ── */
.mobile-tabs {
  display: none;
  background: #252526; border-bottom: 1px solid #3c3c3c; flex-shrink: 0;
}
.mobile-tab {
  flex: 1; height: 38px; background: transparent; color: #858585;
  border: none; border-bottom: 2px solid transparent; cursor: pointer;
  font-size: 13px; font-weight: 500; transition: color .15s;
}
.mobile-tab.active { color: #007acc; border-bottom-color: #007acc; }
.mobile-tab:hover:not(.active) { color: #d4d4d4; }

/* ── Main area ── */
.main { flex: 1; display: flex; overflow: hidden; min-height: 0; }

/* ── Left: Monaco editor ── */
.editor-col {
  position: relative; display: flex; flex-direction: column;
  width: 52%; border-right: 1px solid #3c3c3c; flex-shrink: 0;
  overflow: hidden; min-height: 0;
}
.editor-header {
  display: flex; align-items: center; gap: 6px;
  height: 32px; padding: 0 10px; background: #252526; border-bottom: 1px solid #3c3c3c;
  font-size: 11px; color: #858585; flex-shrink: 0; overflow: hidden;
}
.editor-header .filename {
  color: #d4d4d4; font-weight: 500; font-family: monospace;
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}
/* Monaco absolutely positioned so it gets pixel-perfect height */
#monaco-container { position: absolute; top: 32px; left: 0; right: 0; bottom: 0; }

/* ── Right col ── */
.right-col { flex: 1; display: flex; flex-direction: column; overflow: hidden; min-width: 0; min-height: 0; }

/* Source pane (Renderer mode only) */
.source-pane {
  display: flex; flex-direction: column;
  flex: 0 0 180px; min-height: 100px;
  border-bottom: 1px solid #3c3c3c; overflow: hidden;
}
.source-pane.hidden { display: none; }
.pane-header {
  display: flex; align-items: center; justify-content: space-between;
  height: 28px; padding: 0 10px; background: #252526; border-bottom: 1px solid #3c3c3c;
  font-size: 11px; color: #858585; flex-shrink: 0; gap: 6px;
}
.pane-header select {
  background: #3c3c3c; color: #d4d4d4; border: 1px solid #555;
  border-radius: 3px; font-size: 11px; height: 20px; padding: 0 4px; cursor: pointer;
}
.pane-header select:hover { border-color: #007acc; }
.btn-render-small {
  background: #007acc22; color: #569cd6; border: 1px solid #007acc44;
  border-radius: 3px; font-size: 11px; height: 20px; padding: 0 8px; cursor: pointer;
  flex-shrink: 0;
}
.btn-render-small:hover { background: #007acc44; }
#mdart-source {
  width: 100%; flex: 1; min-height: 0;
  background: #1e1e1e; color: #d4d4d4;
  border: none; outline: none; resize: none;
  font-family: 'Cascadia Code','Fira Code','Consolas',monospace; font-size: 12px;
  line-height: 1.6; padding: 10px 12px; tab-size: 2;
  white-space: pre; overflow-wrap: normal; overflow: auto;
  caret-color: #569cd6;
}

/* Preview pane */
.preview-pane { flex: 1; display: flex; flex-direction: column; overflow: hidden; min-height: 0; }

/* Sub-tabs for Markdown mode */
.preview-subtabs {
  display: none; align-items: center; gap: 1px;
  height: 28px; padding: 0 8px;
  background: #252526; border-bottom: 1px solid #3c3c3c; flex-shrink: 0;
}
.preview-subtabs.visible { display: flex; }
.subtab-btn {
  height: 22px; padding: 0 10px; border: none; border-radius: 3px;
  background: transparent; color: #888; font-size: 11px; cursor: pointer;
}
.subtab-btn.active { background: #007acc; color: #fff; }
.subtab-btn:hover:not(.active) { color: #d4d4d4; }

/* Preview footer (MdArt mode only) */
.preview-footer {
  display: none; align-items: center; gap: 6px;
  height: 32px; padding: 0 10px;
  background: #252526; border-top: 1px solid #3c3c3c; flex-shrink: 0;
}
.preview-footer.visible { display: flex; }
#type-chip {
  font-size: 11px; background: #2d2d2d; border: 1px solid #3c3c3c;
  padding: 2px 8px; border-radius: 10px; color: #858585;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 200px;
}
.footer-right { margin-left: auto; display: flex; gap: 4px; }

.preview-body {
  flex: 1; overflow: auto; display: flex;
  align-items: flex-start; justify-content: center;
  padding: 16px; background: #1a1a1a; min-height: 0;
}
#preview-inner { width: 100%; }
#preview-inner svg { width: 100%; height: auto; display: block; border-radius: 6px; }
.preview-empty { color: #555; font-size: 12px; padding: 20px; }

#html-preview {
  flex: 1; width: 100%; border: none; display: none; background: #fff;
}
#html-preview.visible { display: block; }

/* Markdown mode: iframe fills preview area */
body.markdown-mode .preview-body {
  padding: 0; flex-direction: column; align-items: stretch; overflow: hidden;
}
body.markdown-mode #html-preview.visible { flex: 1; min-height: 0; }

/* Integration docs panel */
#integration-panel {
  display: none; flex: 1; flex-direction: column;
  gap: 20px; overflow: auto; padding: 20px 24px; min-height: 0;
}
#integration-panel.visible { display: flex; }
.int-label {
  font-size: 10px; text-transform: uppercase; letter-spacing: .8px;
  color: #858585; font-weight: 600; margin-bottom: 8px;
}
.int-chips { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 4px; }
.int-chip {
  font-family: monospace; font-size: 12px;
  padding: 3px 10px; border-radius: 20px; border: 1px solid;
}
.int-chip-main { background: #007acc22; color: #569cd6; border-color: #007acc44; }
.int-chip-peer { background: transparent; color: #858585; border-color: #3c3c3c; }
.int-peer-note { font-size: 11px; color: #858585; margin-top: 2px; }
.int-terminal {
  display: flex; align-items: center; gap: 10px;
  background: #141414; border: 1px solid #3c3c3c;
  border-radius: 6px; padding: 10px 14px;
  font-family: monospace; font-size: 12px;
}
.int-prompt { color: #6a9955; user-select: none; flex-shrink: 0; }
.int-terminal code { flex: 1; color: #d4d4d4; word-break: break-all; }
button.int-copy {
  flex-shrink: 0; font-size: 11px; padding: 2px 8px;
  background: #3c3c3c; border: 1px solid #555; border-radius: 4px;
  color: #858585; cursor: pointer;
}
button.int-copy:hover { color: #d4d4d4; }
pre.int-code {
  background: #252526; border: 1px solid #3c3c3c;
  border-radius: 6px; padding: 14px 16px;
  font-family: monospace; font-size: 12px; line-height: 1.65;
  color: #d4d4d4; overflow-x: auto; white-space: pre; margin: 0;
}
.int-note {
  font-size: 12px; color: #858585; line-height: 1.6;
  border-left: 2px solid #3c3c3c; padding-left: 10px;
}
.int-note code {
  font-family: monospace; font-size: 11px;
  background: #252526; padding: 1px 5px; border-radius: 3px;
}

/* Error box */
.error-box {
  background: #1a0808; border: 1px solid #6e1d1d; border-radius: 6px;
  padding: 14px 16px; font-family: monospace; font-size: 12px; color: #f44747;
  max-width: 560px; white-space: pre-wrap; word-break: break-word; line-height: 1.6;
}

/* Loading overlay */
#loading-overlay {
  position: fixed; inset: 0; background: #1e1e1e;
  display: flex; align-items: center; justify-content: center;
  flex-direction: column; gap: 12px; z-index: 100;
}
#loading-overlay .loader-text { color: #858585; font-size: 13px; }
.spinner {
  width: 32px; height: 32px; border: 3px solid #3c3c3c;
  border-top-color: #007acc; border-radius: 50%;
  animation: spin .8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* ── Claude chat panel ── */
.chat-panel {
  position: fixed; top: 0; right: 0; bottom: 0;
  width: 360px; max-width: 90vw;
  background: #1e1e1e; border-left: 1px solid #3c3c3c;
  display: flex; flex-direction: column;
  transform: translateX(100%); transition: transform .22s ease;
  z-index: 200; box-shadow: -4px 0 24px rgba(0,0,0,.5);
}
.chat-panel.open { transform: translateX(0); }

/* Dock mode: on desktop, an open chat panel pushes the toolbar + main area
   left instead of overlaying the diagram. On mobile it stays as an overlay. */
@media (min-width: 900px) {
  .toolbar, .main { transition: margin-right .22s ease; }
  body.chat-docked .toolbar,
  body.chat-docked .main { margin-right: 360px; }
  body.chat-docked .chat-panel { box-shadow: none; }
}
.chat-header {
  display: flex; align-items: center; gap: 6px;
  height: 44px; padding: 0 12px;
  background: #252526; border-bottom: 1px solid #3c3c3c; flex-shrink: 0;
}
.chat-header-title { font-size: 13px; font-weight: 600; color: #c084fc; flex: 1; }
.btn-chat-action {
  background: transparent; color: #858585; border: 1px solid #3c3c3c;
  border-radius: 3px; font-size: 11px; height: 24px; padding: 0 8px; cursor: pointer;
}
.btn-chat-action:hover { background: #3c3c3c; color: #d4d4d4; }
.chat-session-bar {
  display: flex; align-items: center; gap: 4px;
  height: 32px; padding: 0 8px;
  background: #1e1e1e; border-bottom: 1px solid #3c3c3c; flex-shrink: 0;
}
.chat-session-bar select {
  flex: 1; min-width: 0; height: 22px; border-radius: 3px; font-size: 11px; cursor: pointer;
  background: #2d2d2d; color: #d4d4d4; border: 1px solid #3c3c3c; padding: 0 4px;
}
.chat-session-bar select:focus { border-color: #7c3aed; outline: none; }
.btn-session {
  flex-shrink: 0; background: transparent; color: #858585;
  border: 1px solid #3c3c3c; border-radius: 3px; font-size: 12px;
  height: 22px; width: 22px; padding: 0; cursor: pointer; line-height: 1;
}
.btn-session:hover { background: #3c3c3c; color: #d4d4d4; }
.btn-session.danger:hover { background: #3c1a1a; color: #f44747; border-color: #5e3c3c; }
.chat-messages {
  flex: 1; overflow-y: auto; padding: 12px;
  display: flex; flex-direction: column; gap: 10px; min-height: 0;
}
.chat-msg { display: flex; flex-direction: column; gap: 3px; }
.chat-msg-role {
  font-size: 10px; font-weight: 700; letter-spacing: .06em;
  text-transform: uppercase; padding: 0 2px;
}
.chat-msg.user .chat-msg-role { color: #569cd6; }
.chat-msg.assistant .chat-msg-role { color: #c084fc; }
.chat-msg-body {
  font-size: 13px; line-height: 1.65; color: #d4d4d4;
  background: #252526; border-radius: 6px; padding: 8px 10px; word-break: break-word;
}
.chat-msg.user .chat-msg-body { background: #0d1e36; color: #cce5ff; }
.chat-msg-body p { margin: 0 0 6px; }
.chat-msg-body p:last-child { margin: 0; }
.chat-msg-body code {
  background: #1a1a1a; color: #ce9178; border-radius: 3px;
  padding: 1px 5px; font-family: monospace; font-size: 12px;
}
.chat-msg-body pre {
  background: #141414; border: 1px solid #3c3c3c; border-radius: 5px;
  padding: 10px 12px; overflow-x: auto; margin: 6px 0;
}
.chat-msg-body pre code { background: none; padding: 0; color: #d4d4d4; }
.chat-msg-body ul,.chat-msg-body ol { padding-left: 18px; margin: 4px 0; }
.chat-msg-body li { margin: 2px 0; }
.chat-msg-body strong { color: #e2e8f0; }
.chat-msg-body h1,.chat-msg-body h2,.chat-msg-body h3 {
  font-size: 13px; font-weight: 600; color: #e2e8f0; margin: 8px 0 4px;
}
.chat-msg-body table { border-collapse: collapse; width: 100%; margin: 6px 0; font-size: 12px; }
.chat-msg-body th,.chat-msg-body td { border: 1px solid #3c3c3c; padding: 5px 10px; text-align: left; }
.chat-msg-body th { background: #2d2d2d; color: #e2e8f0; font-weight: 600; }
.chat-msg-body tr:nth-child(even) td { background: #252525; }
.chat-typing::after { content: '▋'; animation: blink .8s step-end infinite; color: #c084fc; }
@keyframes blink { 50% { opacity: 0; } }
.chat-empty { color: #555; font-size: 12px; text-align: center; padding: 32px 16px; line-height: 1.7; }
.chat-notice { font-size: 11px; color: #4ec9b0; text-align: center; padding: 4px 8px; opacity: .8; }
.chat-input-area {
  padding: 10px 12px; background: #252526; border-top: 1px solid #3c3c3c;
  display: flex; flex-direction: column; gap: 8px; flex-shrink: 0;
}
#chat-input {
  width: 100%; background: #1e1e1e; color: #d4d4d4;
  border: 1px solid #3c3c3c; border-radius: 5px;
  font-family: system-ui, sans-serif; font-size: 13px; line-height: 1.5;
  padding: 8px 10px; resize: none; outline: none;
}
#chat-input:focus { border-color: #7c3aed; }
.chat-input-row { display: flex; align-items: center; justify-content: space-between; gap: 8px; }
.chat-ctx-label {
  font-size: 11px; color: #666; display: flex; align-items: center; gap: 5px; cursor: pointer;
}
.chat-ctx-label:hover { color: #858585; }
.btn-chat-send {
  background: #7c3aed; color: #fff; border: none;
  border-radius: 4px; height: 28px; padding: 0 14px;
  font-size: 12px; font-weight: 600; cursor: pointer; flex-shrink: 0;
}
.btn-chat-send:hover { background: #8b5cf6; }
.btn-chat-send:disabled { background: #3c3c3c; color: #666; cursor: not-allowed; }

/* ── Mobile (< 768px) ── */
@media (max-width: 767px) {
  .mobile-tabs { display: flex; }
  .desktop-only { display: none !important; }

  /* Two-row toolbar: row 1 = mode toggle + Claude, row 2 = controls + examples */
  .toolbar {
    flex-wrap: wrap;
    height: auto;
    padding: 5px 8px;
    gap: 5px;
    overflow: visible;
    align-items: center;
  }
  .toolbar-logo { display: none; }
  .mode-toggle { order: 1; }
  .sep { order: 2; }           /* flex:1 spacer keeps Claude flush-right on row 1 */
  .btn-claude { order: 3; }
  .status-badge { display: none; }
  /* .toolbar-break: full-width zero-height element that forces a new flex row */
  .toolbar-break { display: block; flex-basis: 100%; height: 0; order: 4; }
  /* Mode controls + examples on row 2 */
  .ctrl-group { order: 5; flex-shrink: 1; }
  #example-select { order: 6; flex: 1 1 0; max-width: none; }
  /* Shrink the renderer file-select on mobile so it doesn't overflow */
  #file-select { max-width: 130px; }

  .main { position: relative; }
  .editor-col {
    position: absolute; inset: 0; width: 100%; border-right: none;
    display: flex; visibility: hidden; pointer-events: none; z-index: 1;
  }
  .editor-col.mob-active { visibility: visible; pointer-events: auto; z-index: 2; }
  .right-col { position: absolute; inset: 0; width: 100%; flex: unset; }
  .source-pane {
    position: absolute; inset: 0;
    flex: unset; min-height: unset; border-bottom: none;
    visibility: hidden; pointer-events: none; z-index: 1;
  }
  .source-pane.mob-active { visibility: visible; pointer-events: auto; z-index: 2; }
  .preview-pane {
    position: absolute; inset: 0; flex: unset;
    visibility: hidden; pointer-events: none; z-index: 1;
  }
  .preview-pane.mob-active { visibility: visible; pointer-events: auto; z-index: 2; }
  #mdart-source { font-size: 14px; }
  .chat-panel { width: 100%; max-width: 100%; }
  .mode-btn { padding: 0 8px; font-size: 12px; }
}
</style>
</head>
<body>

<div id="loading-overlay">
  <div class="spinner"></div>
  <div class="loader-text">Loading Monaco Editor…</div>
</div>

<!-- ── Toolbar ── -->
<div class="toolbar">
  <span class="toolbar-logo">Md<span>Art</span></span>

  <!-- Mode toggle -->
  <div class="mode-toggle">
    <button class="mode-btn active" data-mode="mdart">MdArt</button>
    <button class="mode-btn" data-mode="markdown">Markdown</button>
    <button class="mode-btn" data-mode="renderer">Renderer</button>
  </div>

  <!-- Mobile row-break: pushes controls to second row on narrow screens -->
  <span class="toolbar-break"></span>

  <!-- MdArt controls -->
  <div class="ctrl-group" id="ctrl-mdart">
    <button class="btn btn-primary" id="btn-render">Render</button>
  </div>

  <!-- Markdown controls -->
  <div class="ctrl-group hidden" id="ctrl-markdown">
    <select id="adapter-select" title="Ecosystem adapter">
      <option value="marked">marked v15</option>
      <option value="markdown-it">markdown-it v14</option>
      <option value="unified">unified / remark</option>
    </select>
    <button class="btn btn-primary" id="btn-render-md">Render</button>
  </div>

  <!-- Renderer controls -->
  <div class="ctrl-group hidden" id="ctrl-renderer">
    <select id="file-select" title="Layout file to edit">
      <optgroup label="— process —">
        <option value="layouts/process/process.ts">process</option>
        <option value="layouts/process/chevron-process.ts">chevron-process</option>
        <option value="layouts/process/arrow-process.ts">arrow-process</option>
        <option value="layouts/process/circular-process.ts">circular-process</option>
        <option value="layouts/process/funnel.ts">funnel</option>
        <option value="layouts/process/roadmap.ts">roadmap</option>
        <option value="layouts/process/waterfall.ts">waterfall</option>
        <option value="layouts/process/step-up.ts">step-up</option>

<script>
'use strict'

// ── Layout types ──────────────────────────────────────────────────────────────

const LAYOUT_TYPES = [
  'process','chevron-process','arrow-process','circular-process','funnel','roadmap',
  'waterfall','step-up','step-down','circle-process','equation',
  'bending-process','segmented-bar','phase-process','timeline-h','timeline-v','swimlane',

  'chevron-list','card-list','zigzag-list','ribbon-list','hexagon-list','trapezoid-list',
  'tab-list','circle-list','icon-list',
  'cycle','donut-cycle','gear-cycle','spiral','block-cycle','segmented-cycle',
  'nondirectional-cycle','multidirectional-cycle','loop',
  'swot','pros-cons','comparison','matrix-2x2','bcg','ansoff','matrix-nxm',
  'org-chart','tree','h-org-chart','hierarchy-list','radial-tree','decision-tree',
  'sitemap','bracket','mind-map',
  'pyramid','inverted-pyramid','pyramid-list','segmented-pyramid','diamond-pyramid',
  'venn','venn-3','venn-4','concentric','balance','opposing-arrows',
  'web','cluster','target','radial','converging','diverging','plus',
  'progress-list','bullet-chart','scorecard','treemap','sankey','waffle','gauge','radar','heatmap',
  'kanban','gantt','sprint-board','timeline','milestone','wbs',
  'layered-arch','entity','network','pipeline','sequence','state-machine','class',
]

// ── TYPE_TO_FILE mapping ──────────────────────────────────────────────────────

const TYPE_TO_FILE = {}
const families = {
  process: ['process','chevron-process','arrow-process','circular-process','funnel','roadmap',
    'waterfall','step-up','step-down','circle-process','equation',
    'bending-process','segmented-bar','phase-process','timeline-h','timeline-v','swimlane'],
  list: ['bullet-list','numbered-list','checklist','two-column-list','timeline-list','block-list',
    'chevron-list','card-list','zigzag-list','ribbon-list','hexagon-list','trapezoid-list',
    'tab-list','circle-list','icon-list'],
  cycle: ['cycle','donut-cycle','gear-cycle','spiral','block-cycle','segmented-cycle',
    'nondirectional-cycle','multidirectional-cycle','loop'],
  matrix: ['swot','pros-cons','comparison','matrix-2x2','bcg','ansoff','matrix-nxm'],
  hierarchy: ['org-chart','tree','h-org-chart','hierarchy-list','radial-tree','decision-tree',
    'sitemap','bracket','mind-map'],
  pyramid: ['pyramid','inverted-pyramid','pyramid-list','segmented-pyramid','diamond-pyramid'],
  relationship: ['venn','venn-3','venn-4','concentric','balance','opposing-arrows',
    'web','cluster','target','radial','converging','diverging','plus'],
  statistical: ['progress-list','bullet-chart','scorecard','treemap','sankey','waffle','gauge','radar','heatmap'],
  planning: ['kanban','gantt','sprint-board','timeline','milestone','wbs'],
  technical: ['layered-arch','entity','network','pipeline','sequence','state-machine','class'],
}
for (const [fam, types] of Object.entries(families)) {
  for (const t of types) TYPE_TO_FILE[t] = `layouts/${fam}/${t}.ts`
}
const FILE_TO_TYPE = Object.fromEntries(Object.entries(TYPE_TO_FILE).map(([t,f]) => [f,t]))

// ── Examples (loaded from server) ────────────────────────────────────────────

// Populated by fetchExamples() before Monaco init completes
let examples = { mdart: [], markdown: [], types: {} }
// mdart/markdown: [{slug, name, content}]; types: {type: content}

// Build lookup maps after loading
let EXAMPLES = {}         // name → content  (mdart curated)
let MARKDOWN_EXAMPLES = {} // name → content  (markdown curated)
let TYPE_EXAMPLES = {}    // type → content   (per-type)

function rebuildExampleMaps() {
  EXAMPLES = Object.fromEntries(examples.mdart.map(e => [e.name, e.content]))
  MARKDOWN_EXAMPLES = Object.fromEntries(examples.markdown.map(e => [e.name, e.content]))
  TYPE_EXAMPLES = examples.types
}

const examplesReady = fetch('/examples')
  .then(r => r.json())
  .then(data => { examples = data; rebuildExampleMaps() })
  .catch(() => {})

// ── Integration docs (Markdown mode Code sub-tab) ─────────────────────────────

const INTEGRATION_DOCS = {
  'marked': {
    label: 'marked v15', packages: ['mdart-marked'], peers: ['marked'],
    install: 'npm install mdart-marked marked',
    usage: `import { Marked } from 'marked'
import { mdartExtension } from 'mdart-marked'

const marked = new Marked({ extensions: [mdartExtension()] })
const html = await marked.parse(markdown)`,
    note: '<code>mdartExtension()</code> intercepts <code>```mdart</code> fences at the tokenizer level.',
  },
  'markdown-it': {
    label: 'markdown-it v14', packages: ['mdart-markdown-it'], peers: ['markdown-it'],
    install: 'npm install mdart-markdown-it markdown-it',
    usage: `import MarkdownIt from 'markdown-it'
import { mdartPlugin } from 'mdart-markdown-it'

const md = new MarkdownIt().use(mdartPlugin)
const html = md.render(markdown)`,
    note: 'The plugin overrides the <code>fence</code> renderer rule. Non-mdart fences pass through unchanged.',
  },
  'unified': {
    label: 'unified / remark', packages: ['mdart-remark'],
    peers: ['unified', 'remark-parse', 'remark-rehype', 'rehype-stringify'],
    install: 'npm install mdart-remark unified remark-parse remark-rehype rehype-stringify',
    usage: `import { unified } from 'unified'
import remarkParse from 'remark-parse'
import remarkRehype from 'remark-rehype'
import rehypeStringify from 'rehype-stringify'
import { remarkMdart } from 'mdart-remark'

const html = await unified()
  .use(remarkParse)
  .use(remarkMdart)
  .use(remarkRehype, { allowDangerousHtml: true })
  .use(rehypeStringify, { allowDangerousHtml: true })
  .process(markdown)
  .then(String)`,
    note: 'The plugin visits <code>code</code> nodes with <code>lang="mdart"</code> and replaces them with raw <code>html</code> nodes.',
  },
}

const FENCE_SYNTAX = `# Auto-detect type from front-matter
\`\`\`mdart
type: process
title: My Diagram

- Step A
- Step B
\`\`\`

# Override type via language tag
\`\`\`mdart kanban
title: Sprint

- Todo
  - Task A
- Done
  - Task B
\`\`\``

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
}

function buildIntegrationHTML(adapter) {
  const doc = INTEGRATION_DOCS[adapter]
  if (!doc) return `<p style="color:#858585">Unknown adapter</p>`
  const chips = [
    ...doc.packages.map(p => `<span class="int-chip int-chip-main">${escHtml(p)}</span>`),
    ...doc.peers.map(p => `<span class="int-chip int-chip-peer">${escHtml(p)}</span>`),
  ].join('')
  return `
    <div><div class="int-label">Packages</div>
    <div class="int-chips">${chips}</div>
    <div class="int-peer-note">Peer dependencies shown in grey</div></div>
    <div><div class="int-label">Install</div>
    <div class="int-terminal">
      <span class="int-prompt">$</span>
      <code id="int-install-code">${escHtml(doc.install)}</code>
      <button class="int-copy" id="int-copy-btn">Copy</button>
    </div></div>
    <div><div class="int-label">Usage</div>
    <pre class="int-code">${escHtml(doc.usage)}</pre></div>
    <div><div class="int-label">Fence syntax</div>
    <pre class="int-code">${escHtml(FENCE_SYNTAX)}</pre></div>
    <div><div class="int-label">Note</div>
    <p class="int-note">${doc.note}</p></div>`
}

// ── State ─────────────────────────────────────────────────────────────────────

let mode = 'mdart'           // 'mdart' | 'markdown' | 'renderer'
let monacoEditor = null
let lastSVG = ''
let isDirty = false
let originalContent = ''
let currentFile = localStorage.getItem('mdart-renderer-file') || 'layouts/process/circular-process.ts'
let renderTimer = null
let previewSubTab = 'preview'
let chatStreaming = false
// Per-mode editor content saved on mode switch so switching back restores where you left off
const savedContent = { mdart: '', markdown: '', renderer: '' }
let currentExample = null  // { category: 'mdart'|'markdown'|'types', slug: string } | null
let exampleBaseContent = ''  // content at time of load, for dirty detection
// Auto-render on change (persisted); renderer mode is always manual
let autoRender = localStorage.getItem('mdart-auto-render') !== 'false'

// ── Mode switching ────────────────────────────────────────────────────────────

function setMode(newMode) {
  if (newMode === mode && monacoEditor) return
  // Save current editor content before leaving this mode
  if (monacoEditor && mode !== newMode) {
    savedContent[mode] = monacoEditor.getValue()
  }
  mode = newMode
  localStorage.setItem('mdart-mode', newMode)
  currentExample = null
  updateSaveBtn()

  // Update toggle buttons
  document.querySelectorAll('.mode-btn').forEach(b =>
    b.classList.toggle('active', b.dataset.mode === newMode)
  )

  // Show/hide toolbar control groups
  document.getElementById('ctrl-mdart').classList.toggle('hidden', newMode !== 'mdart')
  document.getElementById('ctrl-markdown').classList.toggle('hidden', newMode !== 'markdown')
  document.getElementById('ctrl-renderer').classList.toggle('hidden', newMode !== 'renderer')

  // Source pane: only in renderer mode
  document.getElementById('pane-source').classList.toggle('hidden', newMode !== 'renderer')

  // Preview sub-tabs: only in markdown mode
  document.getElementById('preview-subtabs').classList.toggle('visible', newMode === 'markdown')

  // Preview footer (SVG export): only in mdart mode
  document.getElementById('preview-footer').classList.toggle('visible', newMode === 'mdart')

  // body class for markdown iframe styling
  document.body.classList.toggle('markdown-mode', newMode === 'markdown')

  // Integration panel: hide when leaving markdown
  if (newMode !== 'markdown') hideIntegration()

  // HTML preview iframe: hide when not in markdown
  if (newMode !== 'markdown') {
    document.getElementById('html-preview').classList.remove('visible')
  }

  // Mobile tabs
  const mobTabSource = document.getElementById('mob-tab-source')
  mobTabSource.style.display = newMode === 'renderer' ? '' : 'none'

  // Editor header filename
  const filename = document.getElementById('editor-filename')
  if (newMode === 'renderer') {
    filename.textContent = currentFile.split('/').pop()
  } else {
    filename.textContent = newMode === 'markdown' ? 'markdown source' : 'mdart source'
  }

  // Dirty dot: only in renderer mode
  document.getElementById('dirty-dot').classList.toggle('visible', newMode === 'renderer' && isDirty)
  document.getElementById('dirty-dot-header').classList.toggle('visible', newMode === 'renderer' && isDirty)

  // Auto-render toggle: irrelevant in renderer mode (always manual there)
  document.getElementById('btn-auto-render').classList.toggle('hidden', newMode === 'renderer')

  // Populate example select for current mode
  populateExampleSelect()

  // Monaco language
  if (monacoEditor) {
    const lang = newMode === 'renderer' ? 'typescript' : newMode === 'markdown' ? 'markdown' : 'plaintext'
    monaco.editor.setModelLanguage(monacoEditor.getModel(), lang)

    if (newMode === 'renderer') {
      // Pre-populate mdart-source with example for current type if empty
      const srcEl = document.getElementById('mdart-source')
      if (!srcEl.value.trim()) {
        const type = FILE_TO_TYPE[currentFile]
        srcEl.value = (type && TYPE_EXAMPLES[type]) || TYPE_EXAMPLES['process'] || ''
      }
      // Always load from disk — savedContent.renderer not used
      loadRendererFile(currentFile)
    } else if (newMode === 'markdown') {
      // Restore saved markdown content, or fall back to first example
      monacoEditor.setValue(savedContent.markdown || (examples.markdown[0]?.content ?? ''))
      renderMarkdown(true)
    } else {
      // Restore saved mdart content, or fall back to default example
      monacoEditor.setValue(savedContent.mdart || (examples.mdart[0]?.content ?? ''))
      renderMdArt(true)
    }
  }
}

function populateExampleSelect() {
  const sel = document.getElementById('example-select')
  while (sel.options.length > 1) sel.remove(1)

  if (mode === 'renderer') {
    // Grouped by family — 97 types (renderer mode uses plain type names)
    for (const [fam, types] of Object.entries(families)) {
      const grp = document.createElement('optgroup')
      grp.label = fam
      for (const t of types) {
        const opt = document.createElement('option')
        opt.value = t; opt.textContent = t
        grp.appendChild(opt)
      }
      sel.appendChild(grp)
    }
    return
  }

  // MdArt + Markdown modes: values are prefixed to disambiguate
  // ("curated:<slug>" for showcase examples, "type:<name>" for per-type examples)
  const arr = mode === 'markdown' ? examples.markdown : examples.mdart
  if (arr.length) {
    const grp = document.createElement('optgroup')
    grp.label = 'Showcase'
    for (const e of arr) {
      const opt = document.createElement('option')
      opt.value = 'curated:' + e.slug; opt.textContent = e.name
      grp.appendChild(opt)
    }
    sel.appendChild(grp)
  }
  // Per-type examples — only meaningful in MdArt mode (markdown doesn't map to types)
  if (mode === 'mdart') {
    for (const [fam, types] of Object.entries(families)) {
      const grp = document.createElement('optgroup')
      grp.label = fam
      for (const t of types) {
        const opt = document.createElement('option')
        opt.value = 'type:' + t; opt.textContent = t
        grp.appendChild(opt)
      }
      sel.appendChild(grp)
    }
  }
}

document.getElementById('example-select').addEventListener('change', function() {
  if (!this.value) return
  if (mode === 'renderer') {
    loadTypeExample(this.value)
    this.value = ''
    return
  }

  // MdArt + Markdown modes: value is prefixed "curated:<slug>" or "type:<name>"
  const val = this.value
  let src = null
  let newCurrentExample = null

  if (val.startsWith('type:')) {
    // Per-type example — load from TYPE_EXAMPLES map, not a saveable slug
    const typeName = val.slice(5)
    src = TYPE_EXAMPLES[typeName]
  } else if (val.startsWith('curated:')) {
    const slug = val.slice(8)
    const arr = mode === 'markdown' ? examples.markdown : examples.mdart
    const cat = mode === 'markdown' ? 'markdown' : 'mdart'
    const found = arr.find(e => e.slug === slug)
    src = found?.content
    if (found) newCurrentExample = { category: cat, slug: found.slug }
  }

  if (src && monacoEditor) {
    monacoEditor.setValue(src)
    currentExample = newCurrentExample
    exampleBaseContent = src
    updateSaveBtn()
    if (mode === 'markdown') renderMarkdown(true)
    else renderMdArt(true)
  }
  this.value = ''
})

async function loadRendererFile(file) {
  setStatus('busy', 'loading…')
  try {
    const res = await fetch(`/lab/source?file=${encodeURIComponent(file)}`)
    const data = await res.json()
    if (!res.ok) throw new Error(data.error)

}

// ── Render functions ──────────────────────────────────────────────────────────

async function renderMdArt(explicit = false) {
  if (!monacoEditor) return
  const source = monacoEditor.getValue().trim()
  if (!source) return
  setStatus('busy', 'rendering…')
  try {
    const res = await fetch('/render', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ source }),
    })
    const data = await res.json()
    if (!res.ok) throw new Error(data.error ?? `HTTP ${res.status}`)
    lastSVG = data.svg
    showSVG(data.svg)
    const chip = document.getElementById('type-chip')
    chip.textContent = data.title ? `${data.type} — ${data.title}` : data.type
    setStatus('ok', data.type)
    if (explicit && isMobile()) showMobPane('preview')
  } catch (err) {
    showError(err.message)
    setStatus('error', 'error')
  }
}

async function renderMarkdown(explicit = false) {
  if (!monacoEditor) return
  const source = monacoEditor.getValue().trim()
  if (!source) return
  const adapter = document.getElementById('adapter-select').value
  setStatus('busy', 'rendering…')
  try {
    const res = await fetch('/render/ecosystem', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ source, adapter }),
    })
    const data = await res.json()
    if (!res.ok) throw new Error(data.error ?? `HTTP ${res.status}`)
    showHTML(data.html, data.adapter)
    setStatus('ok', data.adapter)
    if (explicit && isMobile()) showMobPane('preview')
  } catch (err) {
    showError(err.message)
    setStatus('error', 'error')
  }
}

async function applyRenderer() {
  if (!monacoEditor) return false
  const content = monacoEditor.getValue()
  const mdartSource = document.getElementById('mdart-source').value.trim()
  if (!mdartSource) { setStatus('error', 'no source'); return false }
  document.getElementById('btn-apply').disabled = true
  setStatus('busy', 'building…')
  try {
    const res = await fetch('/lab/apply', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ file: currentFile, content, mdartSource }),
    })
    const data = await res.json()
    if (!res.ok) throw new Error(data.error ?? `HTTP ${res.status}`)
    lastSVG = data.svg
    showSVG(data.svg)
    originalContent = content
    isDirty = false
    document.getElementById('dirty-dot').classList.remove('visible')
    document.getElementById('dirty-dot-header').classList.remove('visible')
    setStatus('ok', `built ${data.buildMs}ms`)
    if (isMobile()) showMobPane('preview')
    return true
  } catch (err) {
    showError(err.message)
    setStatus('error', 'build error')
    document.getElementById('btn-apply').disabled = false
    return false
  }
}

async function renderOnly() {
  const mdartSource = document.getElementById('mdart-source').value.trim()
  if (!mdartSource) return
  setStatus('busy', 'rendering…')
  try {
    const res = await fetch('/lab/render', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ mdartSource }),
    })
    const data = await res.json()
    if (!res.ok) throw new Error(data.error ?? `HTTP ${res.status}`)
    lastSVG = data.svg
    showSVG(data.svg)
    setStatus('ok', 'rendered')
  } catch (err) {
    showError(err.message)
    setStatus('error', 'error')
  }
}

function dispatchRender(explicit = false) {
  if (mode === 'mdart') renderMdArt(explicit)
  else if (mode === 'markdown') renderMarkdown(explicit)
  // renderer mode: manual apply only (don't auto-render TypeScript changes)
}

// ── Tab-list interactivity ────────────────────────────────────────────────────

function wireTabRoot(root) {
  const hits = root.querySelectorAll('.mdart-tab-hit')
  if (!hits.length) return
  hits.forEach((hit, i) => {
    hit.style.cursor = 'pointer'
    hit.addEventListener('click', () => activateTab(root, i))
  })
}

function activateTab(root, activeIdx) {
  const textMuted = root.getAttribute('data-text-muted') ?? '#888888'
  const hits = root.querySelectorAll('.mdart-tab-hit')
  const panels = root.querySelectorAll('.mdart-tab-panel')
  hits.forEach((hit, k) => {
    const color = hit.getAttribute('data-color') ?? '#666666'
    const rect = hit.querySelector('.mdart-tab-rect')
    const label = hit.querySelector('.mdart-tab-label')
    const on = k === activeIdx
    if (rect) {
      if (on) { rect.setAttribute('fill', color); rect.removeAttribute('stroke'); rect.removeAttribute('stroke-width') }
      else { rect.setAttribute('fill', `${color}22`); rect.setAttribute('stroke', `${color}55`); rect.setAttribute('stroke-width','1') }
    }
    if (label) { label.setAttribute('fill', on ? '#ffffff' : textMuted); label.setAttribute('font-weight', on ? '700' : '400') }
  })
  panels.forEach(panel => {
    const t = parseInt(panel.getAttribute('data-tab') ?? '-1', 10)
    panel.setAttribute('visibility', t === activeIdx ? 'visible' : 'hidden')
  })
  const contentBg = root.querySelector('.mdart-tab-content-bg')
  const activeColor = hits[activeIdx]?.getAttribute('data-color')
  if (contentBg && activeColor) {
    contentBg.setAttribute('fill', `${activeColor}11`)
    contentBg.setAttribute('stroke', `${activeColor}44`)
    contentBg.setAttribute('stroke-width', '1.2')
  }
}

/**
 * Connects to a job's SSE stream, replaying buffered events and live-streaming new ones.
 * Updates bodyEl with streamed text. Returns the accumulated text.
 * Clears localStorage pending job on done/error.
 */
async function connectToStream(jobId, bodyEl) {
  let accumulated = ''
  try {
    const streamRes = await fetch(`/lab/chat/stream/${jobId}`)
    if (!streamRes.ok) {
      if (streamRes.status === 404) {
        bodyEl.innerHTML = '<span style="color:#f44747">Job not found — server may have restarted</span>'
        bodyEl.classList.remove('chat-typing')
        localStorage.removeItem(PENDING_JOB_KEY)
        return accumulated
      }
      throw new Error(`Stream error ${streamRes.status}`)
    }

    const reader = streamRes.body.getReader()
    const decoder = new TextDecoder()
    let buf = ''

    while (true) {
      const { done, value } = await reader.read()
      if (done) break
      buf += decoder.decode(value, { stream: true })
      const lines = buf.split('\n')
      buf = lines.pop()
      let evtName = ''
      for (const line of lines) {
        if (line.startsWith('event: ')) { evtName = line.slice(7).trim(); continue }
        if (!line.startsWith('data: ')) continue
        let parsed
        try { parsed = JSON.parse(line.slice(6)) } catch { continue }
        if (evtName === 'chunk') {
          const ev = parsed.type === 'stream_event' ? parsed.event : null
          if (ev?.type === 'content_block_delta' && ev.delta?.type === 'text_delta') {
            accumulated += ev.delta.text
            bodyEl.innerHTML = mdToHtml(accumulated)
            bodyEl.classList.add('chat-typing')
            document.getElementById('chat-messages').scrollTop = document.getElementById('chat-messages').scrollHeight
          }
        }
        if (evtName === 'done') {
          bodyEl.classList.remove('chat-typing')
          localStorage.removeItem(PENDING_JOB_KEY)
        }
        if (evtName === 'error') {
          bodyEl.innerHTML = `<span style="color:#f44747">Error: ${escHtml(parsed.message ?? 'Unknown error')}</span>`
          bodyEl.classList.remove('chat-typing')
          localStorage.removeItem(PENDING_JOB_KEY)
        }
      }
    }
  } catch (err) {
    bodyEl.innerHTML = `<span style="color:#f44747">Connection error: ${escHtml(err.message)}</span>`
    bodyEl.classList.remove('chat-typing')
    localStorage.removeItem(PENDING_JOB_KEY)
  }
  return accumulated
}

async function sendChat() {
  if (chatStreaming) return
  const input = document.getElementById('chat-input')
  const message = input.value.trim()
  if (!message) return
  input.value = ''
  input.style.height = ''

  appendMessage('user', message)

  let context = ''
  if (document.getElementById('chat-include-ctx').checked) {
    if (mode === 'renderer' && monacoEditor) {
      context = `Current renderer file: ${currentFile}\n\`\`\`typescript\n${monacoEditor.getValue().slice(0,4000)}\n\`\`\`\n\nCurrent mdart source:\n\`\`\`\n${document.getElementById('mdart-source').value.slice(0,1000)}\n\`\`\``
    } else if (monacoEditor) {
      context = `Current ${mode} source:\n\`\`\`\n${monacoEditor.getValue().slice(0,2000)}\n\`\`\``
    }
  }

  chatStreaming = true
  document.getElementById('btn-chat-send').disabled = true
  const bodyEl = appendStreamingMessage()

  // Generate a stable jobId stored in localStorage so we can reconnect if the page closes
  const jobId = crypto.randomUUID()
  localStorage.setItem(PENDING_JOB_KEY, JSON.stringify({ jobId, sessionId: activeSessionId, timestamp: Date.now() }))

  try {
    const startRes = await fetch('/lab/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ message, context, jobId, sessionId: activeSessionId }),
    })
    if (!startRes.ok) throw new Error(`Start failed: ${startRes.status}`)
    await connectToStream(jobId, bodyEl)
    // Refresh history from server after stream completes
    const updated = await fetchHistory(activeSessionId)
    if (updated) {
      chatHistory = updated.history
      renderHistory()
      const s = sessions.find(s => s.id === activeSessionId)
      if (s) { s.messageCount = chatHistory.length; populateSessionSelect() }
    }
    // Renderer mode: reload file and rebuild
    if (mode === 'renderer') {
      await loadRendererFile(currentFile)
      // Re-enable apply after external file change — applyRenderer will disable it again on success
      isDirty = true
      document.getElementById('btn-apply').disabled = false
      const built = await applyRenderer()
      const notice = document.createElement('div')
      notice.className = 'chat-notice'
      notice.textContent = built ? '↻ File reloaded · bundle rebuilt' : '↻ File reloaded — click Apply to build'
      document.getElementById('chat-messages').appendChild(notice)
    }
  } catch (err) {
    bodyEl.innerHTML = `<span style="color:#f44747">Connection error: ${escHtml(err.message)}</span>`
    bodyEl.classList.remove('chat-typing')
    localStorage.removeItem(PENDING_JOB_KEY)
  } finally {
    chatStreaming = false
    document.getElementById('btn-chat-send').disabled = false
  }
}

async function attemptReconnect(jobId) {
  if (chatStreaming) return
  chatStreaming = true
  document.getElementById('btn-chat-send').disabled = true
  const bodyEl = appendStreamingMessage()
  bodyEl.innerHTML = '<em style="color:#888;font-size:12px">Reconnecting to in-progress response…</em>'
  bodyEl.classList.add('chat-typing')
  try {
    await connectToStream(jobId, bodyEl)
  } catch (err) {
    bodyEl.innerHTML = `<span style="color:#f44747">Reconnect error: ${escHtml(err.message)}</span>`
    bodyEl.classList.remove('chat-typing')
    localStorage.removeItem(PENDING_JOB_KEY)
  } finally {
    chatStreaming = false
    document.getElementById('btn-chat-send').disabled = false
  }
}


document.getElementById('btn-chat-send').addEventListener('click', sendChat)
document.getElementById('session-select').addEventListener('change', async function() {
  if (this.value && this.value !== activeSessionId) await switchToSession(this.value)
})

document.getElementById('btn-session-new').addEventListener('click', async () => {
  const s = await createSession(`Chat ${sessions.length + 1}`)
  sessions.unshift({ id: s.id, name: s.name, messageCount: 0, updatedAt: s.updatedAt })
  populateSessionSelect()
  await switchToSession(s.id)
})

document.getElementById('btn-session-rename').addEventListener('click', async () => {
  const current = sessions.find(s => s.id === activeSessionId)
  const name = prompt('Rename session:', current?.name ?? '')
  if (!name?.trim()) return
  await renameSession(activeSessionId, name.trim())
  if (current) current.name = name.trim()
  populateSessionSelect()
})

document.getElementById('btn-session-clear').addEventListener('click', async () => {
  if (!confirm('Clear this session\'s history?')) return
  await clearSessionHistory(activeSessionId)
  chatHistory = []
  renderHistory()
  const s = sessions.find(s => s.id === activeSessionId)
  if (s) { s.messageCount = 0; populateSessionSelect() }
})

document.getElementById('btn-session-delete').addEventListener('click', async () => {
  if (sessions.length <= 1) { alert('Cannot delete the only session.'); return }
  if (!confirm('Delete this session?')) return
  await deleteSession(activeSessionId)
  sessions = sessions.filter(s => s.id !== activeSessionId)
  activeSessionId = sessions[0].id
  localStorage.setItem(ACTIVE_SESSION_KEY, activeSessionId)
  populateSessionSelect()
  await switchToSession(activeSessionId)
})

document.getElementById('btn-chat-close').addEventListener('click', () => {
  document.getElementById('chat-panel').classList.remove('open')
  document.getElementById('btn-chat-toggle').classList.remove('active')
  document.body.classList.remove('chat-docked')
})
document.getElementById('btn-chat-toggle').addEventListener('click', () => {
  const panel = document.getElementById('chat-panel')
  const btn = document.getElementById('btn-chat-toggle')
  const open = panel.classList.toggle('open')
  btn.classList.toggle('active', open)
  document.body.classList.toggle('chat-docked', open)
  if (open) {
    fetchSessions().then(() => populateSessionSelect())
  }
})
document.getElementById('chat-input').addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendChat() }
})

function checkPendingJob() {
  const raw = localStorage.getItem(PENDING_JOB_KEY)
  if (!raw) return
  let pending
  try { pending = JSON.parse(raw) } catch { localStorage.removeItem(PENDING_JOB_KEY); return }
  if (!pending.jobId || (Date.now() - pending.timestamp) > 2 * 60 * 60 * 1000) {
    localStorage.removeItem(PENDING_JOB_KEY); return
  }
  // Verify the session still exists
  const sessionExists = sessions.find(s => s.id === pending.sessionId)
  if (!sessionExists) { localStorage.removeItem(PENDING_JOB_KEY); return }

  const chatToggle = document.getElementById('btn-chat-toggle')
  chatToggle.style.position = 'relative'
  const badge = document.createElement('span')
  badge.id = 'chat-pending-badge'
  badge.style.cssText = 'position:absolute;top:-3px;right:-3px;width:8px;height:8px;border-radius:50%;background:#c084fc;display:block'
  chatToggle.appendChild(badge)

  async function onOpen() {
    const b = document.getElementById('chat-pending-badge')
    if (b) b.remove()
    if (pending.sessionId && pending.sessionId !== activeSessionId) {
      await switchToSession(pending.sessionId)
    }
    setTimeout(() => attemptReconnect(pending.jobId), 100)
  }
  if (document.getElementById('chat-panel').classList.contains('open')) {
    onOpen()
  } else {
    chatToggle.addEventListener('click', onOpen, { once: true })
  }
}

// Claude availability check
fetch('/lab/chat/status').then(r => r.json()).then(data => {
  if (data.available) {
    document.getElementById('btn-chat-toggle').classList.remove('hidden')
  }
}).catch(() => {})

// ── Markdown → HTML (chat rendering) ─────────────────────────────────────────

function mdToHtml(md) {
  const blocks = []
  md = md.replace(/```(\w*)\n?([\s\S]*?)```/g, (_, lang, code) => {
    const i = blocks.push('<pre><code>' + escHtml(code.trimEnd()) + '</code></pre>') - 1
    return '\x00B' + i + '\x00'
  })
  const inline = s => s
    .replace(/`([^`\n]+)`/g, (_, c) => '<code>' + escHtml(c) + '</code>')
    .replace(/\*\*([^*\n]+)\*\*/g, '<strong>$1</strong>')
    .replace(/\*([^*\n]+)\*/g, '<em>$1</em>')
  const tableRow = line => {
    const t = line.trim()
    if (!t.startsWith('|')) return null
    return t.replace(/^\||\|$/g,'').split('|').map(c => inline(c.trim()))
  }
  const isSeparator = line => /^\|[\s\-:|]+\|/.test(line.trim())
  const lines = md.split('\n')
  const out = []
  let inUl = false, inOl = false, inTable = false, tableHead = null
  const closeAll = () => {
    if (inUl) { out.push('</ul>'); inUl = false }
    if (inOl) { out.push('</ol>'); inOl = false }
    if (inTable) { out.push('</tbody></table>'); inTable = false; tableHead = null }
  }
  for (const line of lines) {
    if (/^\x00B\d+\x00$/.test(line.trim())) { closeAll(); out.push(blocks[parseInt(line.trim().slice(2,-1))]); continue }
    if (isSeparator(line)) {
      if (inTable && tableHead === null) {
        for (let i = out.length-1; i >= 0; i--) {
          if (out[i].startsWith('<tr>')) {
            out[i] = '<thead>' + out[i].replace(/<td>/g,'<th>').replace(/<\/td>/g,'</th>') + '</thead><tbody>'
            tableHead = true; break
          }
        }
      }
      continue
    }
    const cells = tableRow(line)
    if (cells) {
      if (!inTable) { closeAll(); out.push('<table>'); inTable = true }
      out.push('<tr>' + cells.map(c => `<td>${c}</td>`).join('') + '</tr>'); continue
    }
    const hm = line.match(/^(#{1,3})\s+(.*)/)
    if (hm) { closeAll(); out.push(`<h${hm[1].length}>${inline(hm[2])}</h${hm[1].length}>`); continue }
    const ulm = line.match(/^[-*]\s+(.*)/)
    if (ulm) {
      if (inOl) { out.push('</ol>'); inOl = false }
      if (inTable) closeAll()
      if (!inUl) { out.push('<ul>'); inUl = true }
      out.push(`<li>${inline(ulm[1])}</li>`); continue
    }
    const olm = line.match(/^\d+\.\s+(.*)/)
    if (olm) {
      if (inUl) { out.push('</ul>'); inUl = false }
      if (inTable) closeAll()
      if (!inOl) { out.push('<ol>'); inOl = true }
      out.push(`<li>${inline(olm[1])}</li>`); continue
    }
    if (line.trim() === '') { closeAll(); continue }
    closeAll()
    out.push(`<p>${inline(line)}</p>`)
  }
  closeAll()
  return out.join('\n').replace(/\x00B(\d+)\x00/g, (_, i) => blocks[parseInt(i)])
}

// ── Monaco init ───────────────────────────────────────────────────────────────

require.config({ paths: { vs: 'https://cdn.jsdelivr.net/npm/monaco-editor@0.55.1/min/vs' } })
require(['vs/editor/editor.main'], async function() {
  await examplesReady
  // Disable semantic validation for TypeScript (imports can't resolve in browser)
  monaco.languages.typescript.typescriptDefaults.setCompilerOptions({
    target: monaco.languages.typescript.ScriptTarget.ES2022,
    moduleResolution: monaco.languages.typescript.ModuleResolutionKind.NodeJs,
    allowNonTsExtensions: true,
    noLib: true,
  })
  monaco.languages.typescript.typescriptDefaults.setDiagnosticsOptions({
    noSemanticValidation: true,
    noSyntaxValidation: false,
  })

  monacoEditor = monaco.editor.create(document.getElementById('monaco-container'), {
    value: examples.mdart[0]?.content ?? '',
    language: 'plaintext',
    theme: 'vs-dark',
    fontSize: 13,
    fontFamily: "'Cascadia Code','Fira Code','Consolas',monospace",
    minimap: { enabled: false },
    wordWrap: 'on',
    lineNumbers: 'on',
    scrollBeyondLastLine: false,
    bracketPairColorization: { enabled: true },
    renderWhitespace: 'none',
    automaticLayout: true,
    tabSize: 2,
  })

  // Ctrl+Enter in Monaco
  monacoEditor.addCommand(monaco.KeyMod.CtrlCmd | monaco.KeyCode.Enter, () => {
    if (mode === 'renderer') applyRenderer()
    else dispatchRender(true)
  })

  // Auto-render on change (debounced, MdArt + Markdown modes only)
  monacoEditor.onDidChangeModelContent(() => {
    if (mode === 'renderer') {
      isDirty = monacoEditor.getValue() !== originalContent
      document.getElementById('dirty-dot').classList.toggle('visible', isDirty)
      document.getElementById('dirty-dot-header').classList.toggle('visible', isDirty)
      document.getElementById('btn-apply').disabled = !isDirty
      return
    }
    if (!autoRender) return
    clearTimeout(renderTimer)
    updateSaveBtn()
    renderTimer = setTimeout(() => dispatchRender(false), 500)
  })

  // Init sessions (fetches from server, renders history)
  await initSessions()

  // Hide loading overlay
  document.getElementById('loading-overlay').style.display = 'none'

  // Restore persisted selections before setMode
  const savedAdapter = localStorage.getItem('mdart-adapter')
  if (savedAdapter) document.getElementById('adapter-select').value = savedAdapter
  const fileSelect = document.getElementById('file-select')
  if (fileSelect.querySelector(`option[value="${currentFile}"]`)) {
    fileSelect.value = currentFile
    document.getElementById('editor-filename').textContent = currentFile.split('/').pop()
  }

  // Restore last-used mode (default mdart)
  const savedMode = localStorage.getItem('mdart-mode') ?? 'mdart'
  setMode(savedMode)
  // mdart: setMode guard returns early (mode already === 'mdart'), trigger render manually
  // markdown/renderer: setMode runs fully and triggers their own renders
  if (savedMode === 'mdart') renderMdArt(false)

  // Populate example select for initial mode
  populateExampleSelect()
})
</script>
