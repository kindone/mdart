<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>MdArt Demo</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { height: 100%; overflow: hidden; }
body {
  height: 100%; overflow: hidden;
  background: #1e1e1e; color: #d4d4d4;
  font-family: system-ui, sans-serif;
  display: flex; flex-direction: column;
}

/* ── Toolbar ── */
.toolbar {
  display: flex; align-items: center; gap: 6px;
  height: 44px; padding: 0 12px;
  background: #2d2d2d; border-bottom: 1px solid #3c3c3c;
  flex-shrink: 0; overflow: hidden;
}
.toolbar-logo { font-size: 14px; font-weight: 700; color: #d4d4d4; flex-shrink: 0; letter-spacing: -.3px; }
.toolbar-logo span { color: #007acc; }

/* Mode toggle pill */
.mode-toggle {
  display: flex; gap: 1px;
  background: #3c3c3c; border: 1px solid #555;
  border-radius: 5px; padding: 2px; flex-shrink: 0;
}
.mode-btn {
  height: 24px; padding: 0 10px; border: none; border-radius: 3px;
  background: transparent; color: #888; font-size: 12px; font-weight: 500;
  cursor: pointer; white-space: nowrap; transition: color .1s;
}
.mode-btn:hover { color: #d4d4d4; }
.mode-btn.active { background: #007acc; color: #fff; }

/* Mode-specific controls */
.ctrl-group { display: flex; align-items: center; gap: 5px; flex-shrink: 0; }
.ctrl-group.hidden { display: none; }

.toolbar select {
  height: 28px; border-radius: 4px; font-size: 12px; cursor: pointer; outline: none;
  background: #3c3c3c; color: #d4d4d4; border: 1px solid #555; padding: 0 8px;
}
.toolbar select:hover, .toolbar select:focus { border-color: #007acc; }

.btn {
  height: 28px; border-radius: 4px; font-size: 12px; cursor: pointer;
  outline: none; border: 1px solid #555; padding: 0 10px; white-space: nowrap;
}
.btn-primary { background: #007acc; color: #fff; border-color: #007acc; font-weight: 600; }
.btn-primary:hover { background: #0098ff; }
.btn-primary:disabled { background: #555; color: #888; cursor: not-allowed; }
.btn-ghost { background: transparent; color: #888; }
.btn-ghost:hover { background: #3c3c3c; color: #d4d4d4; border-color: #777; }
.btn-claude {
  background: #1a1228; color: #c084fc; border: 1px solid #7c3aed44;
  border-radius: 4px; height: 28px; padding: 0 10px; font-size: 12px;
  font-weight: 500; cursor: pointer; white-space: nowrap; flex-shrink: 0;
}
.btn-claude:hover { background: #2d1f50; border-color: #a78bfa; color: #e9d5ff; }
.btn-claude.active { background: #2d1f50; border-color: #a78bfa; color: #e9d5ff; }

.sep { flex: 1; min-width: 0; }

.dirty-dot {
  width: 8px; height: 8px; border-radius: 50%; background: #e5c07b;
  display: none; flex-shrink: 0; margin-left: 2px;
}
.dirty-dot.visible { display: inline-block; }

.status-badge {
  font-size: 11px; font-family: monospace;
  padding: 3px 8px; border-radius: 3px;
  background: #2d2d2d; border: 1px solid #3c3c3c;
  white-space: nowrap; flex-shrink: 0;
}
.status-badge.idle  { color: #6a9955; border-color: #3c5e3c; }
.status-badge.busy  { color: #dcdcaa; border-color: #5e5e3c; }
.status-badge.ok    { color: #4ec9b0; border-color: #3c5e5a; }
.status-badge.error { color: #f44747; border-color: #5e3c3c; }

.nav-link {
  font-size: 11px; color: #569cd6; text-decoration: none;
  padding: 3px 6px; border-radius: 3px; white-space: nowrap; flex-shrink: 0;
}
.nav-link:hover { background: #3c3c3c; }

/* ── Mobile tab bar ── */
.mobile-tabs {
  display: none;
  background: #252526; border-bottom: 1px solid #3c3c3c; flex-shrink: 0;
}
.mobile-tab {
  flex: 1; height: 38px; background: transparent; color: #858585;
  border: none; border-bottom: 2px solid transparent; cursor: pointer;
  font-size: 13px; font-weight: 500; transition: color .15s;
}
.mobile-tab.active { color: #007acc; border-bottom-color: #007acc; }
.mobile-tab:hover:not(.active) { color: #d4d4d4; }

/* ── Main area ── */
.main { flex: 1; display: flex; overflow: hidden; min-height: 0; }

/* ── Left: Monaco editor ── */
.editor-col {
  position: relative; display: flex; flex-direction: column;
  width: 52%; border-right: 1px solid #3c3c3c; flex-shrink: 0;
  overflow: hidden; min-height: 0;
}
.editor-header {
  display: flex; align-items: center; gap: 6px;
  height: 32px; padding: 0 10px; background: #252526; border-bottom: 1px solid #3c3c3c;
  font-size: 11px; color: #858585; flex-shrink: 0; overflow: hidden;
}
.editor-header .filename {
  color: #d4d4d4; font-weight: 500; font-family: monospace;
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}
/* Monaco absolutely positioned so it gets pixel-perfect height */
#monaco-container { position: absolute; top: 32px; left: 0; right: 0; bottom: 0; }

/* ── Right col ── */
.right-col { flex: 1; display: flex; flex-direction: column; overflow: hidden; min-width: 0; min-height: 0; }

/* Source pane (Renderer mode only) */
.source-pane {
  display: flex; flex-direction: column;
  flex: 0 0 180px; min-height: 100px;
  border-bottom: 1px solid #3c3c3c; overflow: hidden;
}
.source-pane.hidden { display: none; }
.pane-header {
  display: flex; align-items: center; justify-content: space-between;
  height: 28px; padding: 0 10px; background: #252526; border-bottom: 1px solid #3c3c3c;
  font-size: 11px; color: #858585; flex-shrink: 0; gap: 6px;
}
.pane-header select {
  background: #3c3c3c; color: #d4d4d4; border: 1px solid #555;
  border-radius: 3px; font-size: 11px; height: 20px; padding: 0 4px; cursor: pointer;
}
.pane-header select:hover { border-color: #007acc; }
.btn-render-small {
  background: #007acc22; color: #569cd6; border: 1px solid #007acc44;
  border-radius: 3px; font-size: 11px; height: 20px; padding: 0 8px; cursor: pointer;
  flex-shrink: 0;
}
.btn-render-small:hover { background: #007acc44; }
#mdart-source {
  width: 100%; flex: 1; min-height: 0;
  background: #1e1e1e; color: #d4d4d4;
  border: none; outline: none; resize: none;
  font-family: 'Cascadia Code','Fira Code','Consolas',monospace; font-size: 12px;
  line-height: 1.6; padding: 10px 12px; tab-size: 2;
  white-space: pre; overflow-wrap: normal; overflow: auto;
  caret-color: #569cd6;
}

/* Preview pane */
.preview-pane { flex: 1; display: flex; flex-direction: column; overflow: hidden; min-height: 0; }

/* Sub-tabs for Markdown mode */
.preview-subtabs {
  display: none; align-items: center; gap: 1px;
  height: 28px; padding: 0 8px;
  background: #252526; border-bottom: 1px solid #3c3c3c; flex-shrink: 0;
}
.preview-subtabs.visible { display: flex; }
.subtab-btn {
  height: 22px; padding: 0 10px; border: none; border-radius: 3px;
  background: transparent; color: #888; font-size: 11px; cursor: pointer;
}
.subtab-btn.active { background: #007acc; color: #fff; }
.subtab-btn:hover:not(.active) { color: #d4d4d4; }

/* Preview footer (MdArt mode only) */
.preview-footer {
  display: none; align-items: center; gap: 6px;
  height: 32px; padding: 0 10px;
  background: #252526; border-top: 1px solid #3c3c3c; flex-shrink: 0;
}
.preview-footer.visible { display: flex; }
#type-chip {
  font-size: 11px; background: #2d2d2d; border: 1px solid #3c3c3c;
  padding: 2px 8px; border-radius: 10px; color: #858585;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 200px;
}
.footer-right { margin-left: auto; display: flex; gap: 4px; }

.preview-body {
  flex: 1; overflow: auto; display: flex;
  align-items: flex-start; justify-content: center;
  padding: 16px; background: #1a1a1a; min-height: 0;
}
#preview-inner { width: 100%; }
#preview-inner svg { width: 100%; height: auto; display: block; border-radius: 6px; }
.preview-empty { color: #555; font-size: 12px; padding: 20px; }

#html-preview {
  flex: 1; width: 100%; border: none; display: none; background: #fff;
}
#html-preview.visible { display: block; }

/* Markdown mode: iframe fills preview area */
body.markdown-mode .preview-body {
  padding: 0; flex-direction: column; align-items: stretch; overflow: hidden;
}
body.markdown-mode #html-preview.visible { flex: 1; min-height: 0; }

/* Integration docs panel */
#integration-panel {
  display: none; flex: 1; flex-direction: column;
  gap: 20px; overflow: auto; padding: 20px 24px; min-height: 0;
}
#integration-panel.visible { display: flex; }
.int-label {
  font-size: 10px; text-transform: uppercase; letter-spacing: .8px;
  color: #858585; font-weight: 600; margin-bottom: 8px;
}
.int-chips { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 4px; }
.int-chip {
  font-family: monospace; font-size: 12px;
  padding: 3px 10px; border-radius: 20px; border: 1px solid;
}
.int-chip-main { background: #007acc22; color: #569cd6; border-color: #007acc44; }
.int-chip-peer { background: transparent; color: #858585; border-color: #3c3c3c; }
.int-peer-note { font-size: 11px; color: #858585; margin-top: 2px; }
.int-terminal {
  display: flex; align-items: center; gap: 10px;
  background: #141414; border: 1px solid #3c3c3c;
  border-radius: 6px; padding: 10px 14px;
  font-family: monospace; font-size: 12px;
}
.int-prompt { color: #6a9955; user-select: none; flex-shrink: 0; }
.int-terminal code { flex: 1; color: #d4d4d4; word-break: break-all; }
button.int-copy {
  flex-shrink: 0; font-size: 11px; padding: 2px 8px;
  background: #3c3c3c; border: 1px solid #555; border-radius: 4px;
  color: #858585; cursor: pointer;
}
button.int-copy:hover { color: #d4d4d4; }
pre.int-code {
  background: #252526; border: 1px solid #3c3c3c;
  border-radius: 6px; padding: 14px 16px;
  font-family: monospace; font-size: 12px; line-height: 1.65;
  color: #d4d4d4; overflow-x: auto; white-space: pre; margin: 0;
}
.int-note {
  font-size: 12px; color: #858585; line-height: 1.6;
  border-left: 2px solid #3c3c3c; padding-left: 10px;
}
.int-note code {
  font-family: monospace; font-size: 11px;
  background: #252526; padding: 1px 5px; border-radius: 3px;
}

/* Error box */
.error-box {
  background: #1a0808; border: 1px solid #6e1d1d; border-radius: 6px;
  padding: 14px 16px; font-family: monospace; font-size: 12px; color: #f44747;
  max-width: 560px; white-space: pre-wrap; word-break: break-word; line-height: 1.6;
}

/* Loading overlay */
#loading-overlay {
  position: fixed; inset: 0; background: #1e1e1e;
  display: flex; align-items: center; justify-content: center;
  flex-direction: column; gap: 12px; z-index: 100;
}
#loading-overlay .loader-text { color: #858585; font-size: 13px; }
.spinner {
  width: 32px; height: 32px; border: 3px solid #3c3c3c;
  border-top-color: #007acc; border-radius: 50%;
  animation: spin .8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* ── Claude chat panel ── */
.chat-panel {
  position: fixed; top: 0; right: 0; bottom: 0;
  width: 360px; max-width: 90vw;
  background: #1e1e1e; border-left: 1px solid #3c3c3c;
  display: flex; flex-direction: column;
  transform: translateX(100%); transition: transform .22s ease;
  z-index: 200; box-shadow: -4px 0 24px rgba(0,0,0,.5);
}
.chat-panel.open { transform: translateX(0); }
.chat-header {
  display: flex; align-items: center; gap: 6px;
  height: 44px; padding: 0 12px;
  background: #252526; border-bottom: 1px solid #3c3c3c; flex-shrink: 0;
}
.chat-header-title { font-size: 13px; font-weight: 600; color: #c084fc; flex: 1; }
.btn-chat-action {
  background: transparent; color: #858585; border: 1px solid #3c3c3c;
  border-radius: 3px; font-size: 11px; height: 24px; padding: 0 8px; cursor: pointer;
}
.btn-chat-action:hover { background: #3c3c3c; color: #d4d4d4; }
.chat-messages {
  flex: 1; overflow-y: auto; padding: 12px;
  display: flex; flex-direction: column; gap: 10px; min-height: 0;
}
.chat-msg { display: flex; flex-direction: column; gap: 3px; }
.chat-msg-role {
  font-size: 10px; font-weight: 700; letter-spacing: .06em;
  text-transform: uppercase; padding: 0 2px;
}
.chat-msg.user .chat-msg-role { color: #569cd6; }
.chat-msg.assistant .chat-msg-role { color: #c084fc; }
.chat-msg-body {
  font-size: 13px; line-height: 1.65; color: #d4d4d4;
  background: #252526; border-radius: 6px; padding: 8px 10px; word-break: break-word;
}
.chat-msg.user .chat-msg-body { background: #0d1e36; color: #cce5ff; }
.chat-msg-body p { margin: 0 0 6px; }
.chat-msg-body p:last-child { margin: 0; }
.chat-msg-body code {
  background: #1a1a1a; color: #ce9178; border-radius: 3px;
  padding: 1px 5px; font-family: monospace; font-size: 12px;
}
.chat-msg-body pre {
  background: #141414; border: 1px solid #3c3c3c; border-radius: 5px;
  padding: 10px 12px; overflow-x: auto; margin: 6px 0;
}
.chat-msg-body pre code { background: none; padding: 0; color: #d4d4d4; }
.chat-msg-body ul,.chat-msg-body ol { padding-left: 18px; margin: 4px 0; }
.chat-msg-body li { margin: 2px 0; }
.chat-msg-body strong { color: #e2e8f0; }
.chat-msg-body h1,.chat-msg-body h2,.chat-msg-body h3 {
  font-size: 13px; font-weight: 600; color: #e2e8f0; margin: 8px 0 4px;
}
.chat-msg-body table { border-collapse: collapse; width: 100%; margin: 6px 0; font-size: 12px; }
.chat-msg-body th,.chat-msg-body td { border: 1px solid #3c3c3c; padding: 5px 10px; text-align: left; }
.chat-msg-body th { background: #2d2d2d; color: #e2e8f0; font-weight: 600; }
.chat-msg-body tr:nth-child(even) td { background: #252525; }
.chat-typing::after { content: '▋'; animation: blink .8s step-end infinite; color: #c084fc; }
@keyframes blink { 50% { opacity: 0; } }
.chat-empty { color: #555; font-size: 12px; text-align: center; padding: 32px 16px; line-height: 1.7; }
.chat-notice { font-size: 11px; color: #4ec9b0; text-align: center; padding: 4px 8px; opacity: .8; }
.chat-input-area {
  padding: 10px 12px; background: #252526; border-top: 1px solid #3c3c3c;
  display: flex; flex-direction: column; gap: 8px; flex-shrink: 0;
}
#chat-input {
  width: 100%; background: #1e1e1e; color: #d4d4d4;
  border: 1px solid #3c3c3c; border-radius: 5px;
  font-family: system-ui, sans-serif; font-size: 13px; line-height: 1.5;
  padding: 8px 10px; resize: none; outline: none;
}
#chat-input:focus { border-color: #7c3aed; }
.chat-input-row { display: flex; align-items: center; justify-content: space-between; gap: 8px; }
.chat-ctx-label {
  font-size: 11px; color: #666; display: flex; align-items: center; gap: 5px; cursor: pointer;
}
.chat-ctx-label:hover { color: #858585; }
.btn-chat-send {
  background: #7c3aed; color: #fff; border: none;
  border-radius: 4px; height: 28px; padding: 0 14px;
  font-size: 12px; font-weight: 600; cursor: pointer; flex-shrink: 0;
}
.btn-chat-send:hover { background: #8b5cf6; }
.btn-chat-send:disabled { background: #3c3c3c; color: #666; cursor: not-allowed; }

/* ── Mobile (< 768px) ── */
@media (max-width: 767px) {
  .mobile-tabs { display: flex; }
  .desktop-only { display: none !important; }
  .toolbar { gap: 4px; padding: 0 8px; }
  .toolbar-logo { display: none; }
  .main { position: relative; }
  .editor-col {
    position: absolute; inset: 0; width: 100%; border-right: none;
    display: flex; visibility: hidden; pointer-events: none; z-index: 1;
  }
  .editor-col.mob-active { visibility: visible; pointer-events: auto; z-index: 2; }
  .right-col { position: absolute; inset: 0; width: 100%; flex: unset; }
  .source-pane {
    position: absolute; inset: 0;
    flex: unset; min-height: unset; border-bottom: none;
    visibility: hidden; pointer-events: none; z-index: 1;
  }
  .source-pane.mob-active { visibility: visible; pointer-events: auto; z-index: 2; }
  .preview-pane {
    position: absolute; inset: 0; flex: unset;
    visibility: hidden; pointer-events: none; z-index: 1;
  }
  .preview-pane.mob-active { visibility: visible; pointer-events: auto; z-index: 2; }
  #mdart-source { font-size: 14px; }
  .chat-panel { width: 100%; max-width: 100%; }
  .mode-btn { padding: 0 7px; font-size: 11px; }
  .status-badge { display: none; }
}
</style>
</head>
<body>

<div id="loading-overlay">
  <div class="spinner"></div>
  <div class="loader-text">Loading Monaco Editor…</div>
</div>

<!-- ── Toolbar ── -->
<div class="toolbar">
  <span class="toolbar-logo">Md<span>Art</span></span>

  <!-- Mode toggle -->
  <div class="mode-toggle">
    <button class="mode-btn active" data-mode="mdart">MdArt</button>
    <button class="mode-btn" data-mode="markdown">Markdown</button>
    <button class="mode-btn" data-mode="renderer">Renderer</button>
  </div>

  <!-- MdArt controls -->
  <div class="ctrl-group" id="ctrl-mdart">
    <select id="hint-select" title="Type hint (overrides auto-detect)">
      <option value="">Auto-detect</option>
    </select>
    <button class="btn btn-primary" id="btn-render">Render</button>
  </div>

  <!-- Markdown controls -->
  <div class="ctrl-group hidden" id="ctrl-markdown">
    <select id="adapter-select" title="Ecosystem adapter">
      <option value="marked">marked v15</option>
      <option value="markdown-it">markdown-it v14</option>
      <option value="unified">unified / remark</option>
    </select>
  </div>

  <!-- Renderer controls -->
  <div class="ctrl-group hidden" id="ctrl-renderer">
    <select id="file-select" title="Layout file to edit">
      <optgroup label="— process —">
        <option value="layouts/process/process.ts">process</option>
        <option value="layouts/process/chevron-process.ts">chevron-process</option>
        <option value="layouts/process/arrow-process.ts">arrow-process</option>
        <option value="layouts/process/circular-process.ts">circular-process</option>
        <option value="layouts/process/funnel.ts">funnel</option>
        <option value="layouts/process/roadmap.ts">roadmap</option>
        <option value="layouts/process/waterfall.ts">waterfall</option>
        <option value="layouts/process/snake-process.ts">snake-process</option>
        <option value="layouts/process/step-up.ts">step-up</option>
        <option value="layouts/process/step-down.ts">step-down</option>
        <option value="layouts/process/circle-process.ts">circle-process</option>
        <option value="layouts/process/equation.ts">equation</option>
        <option value="layouts/process/bending-process.ts">bending-process</option>
        <option value="layouts/process/segmented-bar.ts">segmented-bar</option>
        <option value="layouts/process/phase-process.ts">phase-process</option>
        <option value="layouts/process/timeline-h.ts">timeline-h</option>
        <option value="layouts/process/timeline-v.ts">timeline-v</option>
        <option value="layouts/process/swimlane.ts">swimlane</option>
      </optgroup>
      <optgroup label="— list —">
        <option value="layouts/list/bullet-list.ts">bullet-list</option>
        <option value="layouts/list/numbered-list.ts">numbered-list</option>
        <option value="layouts/list/checklist.ts">checklist</option>
        <option value="layouts/list/two-column-list.ts">two-column-list</option>
        <option value="layouts/list/timeline-list.ts">timeline-list</option>
        <option value="layouts/list/block-list.ts">block-list</option>
        <option value="layouts/list/chevron-list.ts">chevron-list</option>
        <option value="layouts/list/card-list.ts">card-list</option>
        <option value="layouts/list/zigzag-list.ts">zigzag-list</option>
        <option value="layouts/list/ribbon-list.ts">ribbon-list</option>
        <option value="layouts/list/hexagon-list.ts">hexagon-list</option>
        <option value="layouts/list/trapezoid-list.ts">trapezoid-list</option>
        <option value="layouts/list/tab-list.ts">tab-list</option>
        <option value="layouts/list/circle-list.ts">circle-list</option>
        <option value="layouts/list/icon-list.ts">icon-list</option>
      </optgroup>
      <optgroup label="— cycle —">
        <option value="layouts/cycle/cycle.ts">cycle</option>
        <option value="layouts/cycle/donut-cycle.ts">donut-cycle</option>
        <option value="layouts/cycle/gear-cycle.ts">gear-cycle</option>
        <option value="layouts/cycle/spiral.ts">spiral</option>
        <option value="layouts/cycle/block-cycle.ts">block-cycle</option>
        <option value="layouts/cycle/segmented-cycle.ts">segmented-cycle</option>
        <option value="layouts/cycle/nondirectional-cycle.ts">nondirectional-cycle</option>
        <option value="layouts/cycle/multidirectional-cycle.ts">multidirectional-cycle</option>
        <option value="layouts/cycle/loop.ts">loop</option>
      </optgroup>
      <optgroup label="— matrix —">
        <option value="layouts/matrix/swot.ts">swot</option>
        <option value="layouts/matrix/pros-cons.ts">pros-cons</option>
        <option value="layouts/matrix/comparison.ts">comparison</option>
        <option value="layouts/matrix/matrix-2x2.ts">matrix-2x2</option>

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
}

function buildIntegrationHTML(adapter) {
  const doc = INTEGRATION_DOCS[adapter]
  if (!doc) return `<p style="color:#858585">Unknown adapter</p>`
  const chips = [
    ...doc.packages.map(p => `<span class="int-chip int-chip-main">${escHtml(p)}</span>`),
    ...doc.peers.map(p => `<span class="int-chip int-chip-peer">${escHtml(p)}</span>`),
  ].join('')
  return `

// ── Mode switching ────────────────────────────────────────────────────────────

function setMode(newMode) {
  if (newMode === mode && monacoEditor) return
  mode = newMode

  // Update toggle buttons
  document.querySelectorAll('.mode-btn').forEach(b =>
    b.classList.toggle('active', b.dataset.mode === newMode)
  )

  // Show/hide toolbar control groups
  document.getElementById('ctrl-mdart').classList.toggle('hidden', newMode !== 'mdart')
  document.getElementById('ctrl-markdown').classList.toggle('hidden', newMode !== 'markdown')
  document.getElementById('ctrl-renderer').classList.toggle('hidden', newMode !== 'renderer')

  // Source pane: only in renderer mode
  document.getElementById('pane-source').classList.toggle('hidden', newMode !== 'renderer')

  // Preview sub-tabs: only in markdown mode
  document.getElementById('preview-subtabs').classList.toggle('visible', newMode === 'markdown')

  // Preview footer (SVG export): only in mdart mode
  document.getElementById('preview-footer').classList.toggle('visible', newMode === 'mdart')

  // body class for markdown iframe styling
  document.body.classList.toggle('markdown-mode', newMode === 'markdown')

  // Integration panel: hide when leaving markdown
  if (newMode !== 'markdown') hideIntegration()

  // HTML preview iframe: hide when not in markdown
  if (newMode !== 'markdown') {
    document.getElementById('html-preview').classList.remove('visible')
  }

  // Mobile tabs
  const mobTabSource = document.getElementById('mob-tab-source')
  mobTabSource.style.display = newMode === 'renderer' ? '' : 'none'

  // Editor header filename
  const filename = document.getElementById('editor-filename')
  if (newMode === 'renderer') {
    filename.textContent = currentFile.split('/').pop()
  } else {
    filename.textContent = newMode === 'markdown' ? 'markdown source' : 'mdart source'
  }

  // Dirty dot: only in renderer mode
  document.getElementById('dirty-dot').classList.toggle('visible', newMode === 'renderer' && isDirty)
  document.getElementById('dirty-dot-header').classList.toggle('visible', newMode === 'renderer' && isDirty)

  // Populate example select for current mode
  populateExampleSelect()

  // Monaco language
  if (monacoEditor) {
    const lang = newMode === 'renderer' ? 'typescript' : newMode === 'markdown' ? 'markdown' : 'plaintext'
    const model = monaco.editor.createModel(monacoEditor.getValue(), lang)
    monacoEditor.setModel(model)

    if (newMode === 'renderer') {
      // Load the current file
      loadRendererFile(currentFile)
    } else if (newMode === 'markdown') {
      if (!monacoEditor.getValue().includes('```mdart')) {
        monacoEditor.setValue(Object.values(MARKDOWN_EXAMPLES)[0])
      }
      renderMarkdown(true)
    } else {
      // mdart mode: restore mdart editor with default if empty
      if (!monacoEditor.getValue().trim()) {
        monacoEditor.setValue(EXAMPLES['Process — Build Pipeline'])
      }
      renderMdArt(true)
    }
  }
}

// ── Example select ────────────────────────────────────────────────────────────

function populateExampleSelect() {
  const sel = document.getElementById('example-select')
  while (sel.options.length > 1) sel.remove(1)

  if (mode === 'renderer') {
    // Grouped by family — 101 types
    for (const [fam, types] of Object.entries(families)) {
      const grp = document.createElement('optgroup')
      grp.label = fam
      for (const t of types) {
        const opt = document.createElement('option')
        opt.value = t; opt.textContent = t
        grp.appendChild(opt)
      }
      sel.appendChild(grp)
    }
  } else {
    const map = mode === 'markdown' ? MARKDOWN_EXAMPLES : EXAMPLES
    for (const name of Object.keys(map)) {
      const opt = document.createElement('option')
      opt.value = name; opt.textContent = name
      sel.appendChild(opt)
    }
  }
}

document.getElementById('example-select').addEventListener('change', function() {
  if (!this.value) return
  if (mode === 'renderer') {
    loadTypeExample(this.value)
  } else {
    const map = mode === 'markdown' ? MARKDOWN_EXAMPLES : EXAMPLES
    const src = map[this.value]
    if (src && monacoEditor) {
      monacoEditor.setValue(src)
      if (mode === 'markdown') renderMarkdown(true)
      else renderMdArt(true)
    }
  }
  this.value = ''
})

// Type examples dropdown (in source pane, renderer mode)
document.getElementById('type-example-select').addEventListener('change', function() {
  if (!this.value) return
  loadTypeExample(this.value)
  this.value = ''
})

function loadTypeExample(type) {
  const src = TYPE_EXAMPLES[type]
  if (src) {
    document.getElementById('mdart-source').value = src
    renderOnly()
  }
  // Sync file select if a file exists for this type
  const file = TYPE_TO_FILE[type]
  if (file) {
    document.getElementById('file-select').value = file
    currentFile = file
    document.getElementById('editor-filename').textContent = file.split('/').pop()
  }
}

  loadRendererFile(this.value)

    document.getElementById('mdart-source').value = TYPE_EXAMPLES[type]

async function loadRendererFile(file) {
  setStatus('busy', 'loading…')
  try {
    const res = await fetch(`/lab/source?file=${encodeURIComponent(file)}`)
    const data = await res.json()
    if (!res.ok) throw new Error(data.error)
    if (monacoEditor) {
      const model = monaco.editor.createModel(data.content, 'typescript')
      monacoEditor.setModel(model)
      // Re-attach change listener
      monacoEditor.onDidChangeModelContent(() => {
        if (mode !== 'renderer') return
        isDirty = monacoEditor.getValue() !== originalContent
        document.getElementById('dirty-dot').classList.toggle('visible', isDirty)
        document.getElementById('dirty-dot-header').classList.toggle('visible', isDirty)
        document.getElementById('btn-apply').disabled = !isDirty
      })
    }
    originalContent = data.content
    isDirty = false
    document.getElementById('dirty-dot').classList.remove('visible')
    document.getElementById('dirty-dot-header').classList.remove('visible')
    document.getElementById('btn-apply').disabled = true
    setStatus('idle', 'ready')
    // Also render current source
    if (document.getElementById('mdart-source').value.trim()) {
      renderOnly()
    }
  } catch (err) {
    setStatus('error', 'load error')
  }
}

// ── Render functions ──────────────────────────────────────────────────────────

async function renderMdArt(explicit = false) {
  if (!monacoEditor) return
  const source = monacoEditor.getValue().trim()
  if (!source) return
  const hintType = document.getElementById('hint-select').value || undefined
  setStatus('busy', 'rendering…')
  try {
    const res = await fetch('/render', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ source, hintType }),
    })
    const data = await res.json()
    if (!res.ok) throw new Error(data.error ?? `HTTP ${res.status}`)
    lastSVG = data.svg
    showSVG(data.svg)
    const chip = document.getElementById('type-chip')
    chip.textContent = data.title ? `${data.type} — ${data.title}` : data.type
    setStatus('ok', data.type)
    if (explicit && isMobile()) showMobPane('preview')
  } catch (err) {
    showError(err.message)
    setStatus('error', 'error')
  }
}

async function renderMarkdown(explicit = false) {
  if (!monacoEditor) return
  const source = monacoEditor.getValue().trim()
  if (!source) return
  const adapter = document.getElementById('adapter-select').value
  setStatus('busy', 'rendering…')
  try {
    const res = await fetch('/render/ecosystem', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ source, adapter }),
    })
    const data = await res.json()
    if (!res.ok) throw new Error(data.error ?? `HTTP ${res.status}`)
    showHTML(data.html, data.adapter)
    setStatus('ok', data.adapter)
    if (explicit && isMobile()) showMobPane('preview')
  } catch (err) {
    showError(err.message)
    setStatus('error', 'error')
  }
}

async function applyRenderer() {
  if (!monacoEditor) return
  const content = monacoEditor.getValue()
  const mdartSource = document.getElementById('mdart-source').value.trim()
  if (!mdartSource) { setStatus('error', 'no source'); return }
  document.getElementById('btn-apply').disabled = true
  setStatus('busy', 'building…')
  try {
    const res = await fetch('/lab/apply', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ file: currentFile, content, mdartSource }),
    })
    const data = await res.json()
    if (!res.ok) throw new Error(data.error ?? `HTTP ${res.status}`)
    lastSVG = data.svg
    showSVG(data.svg)
    originalContent = content
    isDirty = false
    document.getElementById('dirty-dot').classList.remove('visible')
    document.getElementById('dirty-dot-header').classList.remove('visible')
    setStatus('ok', `built ${data.buildMs}ms`)
    if (isMobile()) showMobPane('preview')
  } catch (err) {
    showError(err.message)
    setStatus('error', 'build error')
    document.getElementById('btn-apply').disabled = false
  }
}

async function renderOnly() {
  const mdartSource = document.getElementById('mdart-source').value.trim()
  if (!mdartSource) return
  setStatus('busy', 'rendering…')
  try {
    const res = await fetch('/lab/render', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ mdartSource }),
    })
    const data = await res.json()
    if (!res.ok) throw new Error(data.error ?? `HTTP ${res.status}`)
    lastSVG = data.svg
    showSVG(data.svg)
    setStatus('ok', 'rendered')
  } catch (err) {
    showError(err.message)
    setStatus('error', 'error')
  }
}

function dispatchRender(explicit = false) {
  if (mode === 'mdart') renderMdArt(explicit)
  else if (mode === 'markdown') renderMarkdown(explicit)
  // renderer mode: manual apply only (don't auto-render TypeScript changes)
}

// ── Tab-list interactivity ────────────────────────────────────────────────────

function wireTabRoot(root) {
  const hits = root.querySelectorAll('.mdart-tab-hit')
  if (!hits.length) return
  hits.forEach((hit, i) => {
    hit.style.cursor = 'pointer'
    hit.addEventListener('click', () => activateTab(root, i))
  })
}

function activateTab(root, activeIdx) {
  const textMuted = root.getAttribute('data-text-muted') ?? '#888888'
  const hits = root.querySelectorAll('.mdart-tab-hit')
  const panels = root.querySelectorAll('.mdart-tab-panel')
  hits.forEach((hit, k) => {
    const color = hit.getAttribute('data-color') ?? '#666666'
    const rect = hit.querySelector('.mdart-tab-rect')
    const label = hit.querySelector('.mdart-tab-label')
    const on = k === activeIdx
    if (rect) {
      if (on) { rect.setAttribute('fill', color); rect.removeAttribute('stroke'); rect.removeAttribute('stroke-width') }
      else { rect.setAttribute('fill', `${color}22`); rect.setAttribute('stroke', `${color}55`); rect.setAttribute('stroke-width','1') }
    }
    if (label) { label.setAttribute('fill', on ? '#ffffff' : textMuted); label.setAttribute('font-weight', on ? '700' : '400') }
  })
  panels.forEach(panel => {
    const t = parseInt(panel.getAttribute('data-tab') ?? '-1', 10)
    panel.setAttribute('visibility', t === activeIdx ? 'visible' : 'hidden')
  })
  const contentBg = root.querySelector('.mdart-tab-content-bg')
  const activeColor = hits[activeIdx]?.getAttribute('data-color')
  if (contentBg && activeColor) {
    contentBg.setAttribute('fill', `${activeColor}11`)
    contentBg.setAttribute('stroke', `${activeColor}44`)
    contentBg.setAttribute('stroke-width', '1.2')
  }
}

// ── Mobile pane switching ─────────────────────────────────────────────────────

function isMobile() { return window.innerWidth < 768 }

function showMobPane(name) {
  const panes = {
    editor: document.getElementById('pane-editor'),
    source: document.getElementById('pane-source'),
    preview: document.getElementById('pane-preview'),
  }
  document.querySelectorAll('.mobile-tab').forEach(t =>

  )

// ── Chat panel ────────────────────────────────────────────────────────────────

const CHAT_HISTORY_KEY = 'mdart-chat-history'
const MAX_HISTORY = 60

function loadHistory() {
  try { return JSON.parse(localStorage.getItem(CHAT_HISTORY_KEY) || '[]') } catch { return [] }
}
function saveHistory(history) {
  localStorage.setItem(CHAT_HISTORY_KEY, JSON.stringify(history.slice(-MAX_HISTORY)))
}

let chatHistory = loadHistory()

function renderHistory() {
  const msgs = document.getElementById('chat-messages')
  const empty = document.getElementById('chat-empty')
  if (!chatHistory.length) { empty.style.display = ''; return }
  empty.style.display = 'none'
  msgs.querySelectorAll('.chat-msg').forEach(e => e.remove())
  for (const msg of chatHistory) appendMessage(msg.role, msg.content, false)
  msgs.scrollTop = msgs.scrollHeight
}

function appendMessage(role, content, scroll = true) {
  const empty = document.getElementById('chat-empty')
  empty.style.display = 'none'
  const msgs = document.getElementById('chat-messages')
  const div = document.createElement('div')
  div.className = `chat-msg ${role}`
  div.innerHTML = `<span class="chat-msg-role">${role === 'user' ? 'You' : 'Claude'}</span>
    <div class="chat-msg-body">${role === 'assistant' ? mdToHtml(content) : escHtml(content)}</div>`
  msgs.appendChild(div)
  if (scroll) msgs.scrollTop = msgs.scrollHeight
  return div
}

function appendStreamingMessage() {
  const empty = document.getElementById('chat-empty')
  empty.style.display = 'none'
  const msgs = document.getElementById('chat-messages')
  const div = document.createElement('div')
  div.className = 'chat-msg assistant'
  const body = document.createElement('div')
  body.className = 'chat-msg-body chat-typing'
  div.innerHTML = `<span class="chat-msg-role">Claude</span>`
  div.appendChild(body)
  msgs.appendChild(div)
  msgs.scrollTop = msgs.scrollHeight
  return body
}

async function sendChat() {
  if (chatStreaming) return
  const input = document.getElementById('chat-input')
  const message = input.value.trim()
  if (!message) return
  input.value = ''
  input.style.height = ''

  chatHistory.push({ role: 'user', content: message })
  saveHistory(chatHistory)
  appendMessage('user', message)

  let context = ''
  if (document.getElementById('chat-include-ctx').checked) {
    if (mode === 'renderer' && monacoEditor) {
      context = `Current renderer file: ${currentFile}\n\`\`\`typescript\n${monacoEditor.getValue().slice(0,4000)}\n\`\`\`\n\nCurrent mdart source:\n\`\`\`\n${document.getElementById('mdart-source').value.slice(0,1000)}\n\`\`\``
    } else if (monacoEditor) {
      context = `Current ${mode} source:\n\`\`\`\n${monacoEditor.getValue().slice(0,2000)}\n\`\`\``
    }
  }

  chatStreaming = true
  document.getElementById('btn-chat-send').disabled = true
  const bodyEl = appendStreamingMessage()
  let accumulated = ''

  try {
    const res = await fetch('/lab/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ message, context }),
    })
    const reader = res.body.getReader()
    const decoder = new TextDecoder()
    let buf = ''

    while (true) {
      const { done, value } = await reader.read()
      if (done) break
      buf += decoder.decode(value, { stream: true })
      const lines = buf.split('\n')
      buf = lines.pop()
      let evtName = ''
      for (const line of lines) {
        if (line.startsWith('event: ')) { evtName = line.slice(7).trim(); continue }
        if (!line.startsWith('data: ')) continue
        let parsed
        try { parsed = JSON.parse(line.slice(6)) } catch { continue }
        if (evtName === 'chunk') {
          const ev = parsed.type === 'stream_event' ? parsed.event : null
          if (ev?.type === 'content_block_delta' && ev.delta?.type === 'text_delta') {
            accumulated += ev.delta.text
            bodyEl.innerHTML = mdToHtml(accumulated)
            bodyEl.classList.add('chat-typing')
            document.getElementById('chat-messages').scrollTop = document.getElementById('chat-messages').scrollHeight
          }
          if (parsed.type === 'system' && parsed.subtype === 'init') {
            chatSessionId = parsed.session_id
          }
        }
        if (evtName === 'done') {
          bodyEl.classList.remove('chat-typing')
          chatHistory.push({ role: 'assistant', content: accumulated })
          saveHistory(chatHistory)
          // Reload renderer file if changed
          if (mode === 'renderer') {
            await loadRendererFile(currentFile)
            const notice = document.createElement('div')
            notice.className = 'chat-notice'; notice.textContent = '↻ File reloaded from disk'
            document.getElementById('chat-messages').appendChild(notice)
          }
        }
        if (evtName === 'error') {
          bodyEl.innerHTML = `<span style="color:#f44747">Error: ${escHtml(parsed.message ?? 'Unknown error')}</span>`
          bodyEl.classList.remove('chat-typing')
        }
      }
    }
  } catch (err) {
    bodyEl.innerHTML = `<span style="color:#f44747">Connection error: ${escHtml(err.message)}</span>`
    bodyEl.classList.remove('chat-typing')
  } finally {
    chatStreaming = false
    document.getElementById('btn-chat-send').disabled = false
  }
}

function clearHistory() {
  chatHistory = []
  saveHistory(chatHistory)
  chatSessionId = null
  fetch('/lab/chat/session', { method: 'DELETE' })
  const msgs = document.getElementById('chat-messages')
  msgs.querySelectorAll('.chat-msg,.chat-notice').forEach(e => e.remove())
  document.getElementById('chat-empty').style.display = ''
}

// ── Markdown → HTML (chat rendering) ─────────────────────────────────────────

function mdToHtml(md) {
  const blocks = []
  md = md.replace(/```(\w*)\n?([\s\S]*?)```/g, (_, lang, code) => {
    const i = blocks.push('<pre><code>' + escHtml(code.trimEnd()) + '</code></pre>') - 1
    return '\x00B' + i + '\x00'
  })
  const inline = s => s
    .replace(/`([^`\n]+)`/g, (_, c) => '<code>' + escHtml(c) + '</code>')
    .replace(/\*\*([^*\n]+)\*\*/g, '<strong>$1</strong>')
    .replace(/\*([^*\n]+)\*/g, '<em>$1</em>')
  const tableRow = line => {
    const t = line.trim()
    if (!t.startsWith('|')) return null
    return t.replace(/^\||\|$/g,'').split('|').map(c => inline(c.trim()))
  }
  const isSeparator = line => /^\|[\s\-:|]+\|/.test(line.trim())
  const lines = md.split('\n')
  const out = []
  let inUl = false, inOl = false, inTable = false, tableHead = null
  const closeAll = () => {
    if (inUl) { out.push('</ul>'); inUl = false }
    if (inOl) { out.push('</ol>'); inOl = false }
    if (inTable) { out.push('</tbody></table>'); inTable = false; tableHead = null }
  }
  for (const line of lines) {
    if (/^\x00B\d+\x00$/.test(line.trim())) { closeAll(); out.push(blocks[parseInt(line.trim().slice(2,-1))]); continue }
    if (isSeparator(line)) {
      if (inTable && tableHead === null) {
        for (let i = out.length-1; i >= 0; i--) {
          if (out[i].startsWith('<tr>')) {
            out[i] = '<thead>' + out[i].replace(/<td>/g,'<th>').replace(/<\/td>/g,'</th>') + '</thead><tbody>'
            tableHead = true; break
          }
        }
      }
      continue
    }
    const cells = tableRow(line)
    if (cells) {
      if (!inTable) { closeAll(); out.push('<table>'); inTable = true }
      out.push('<tr>' + cells.map(c => `<td>${c}</td>`).join('') + '</tr>'); continue
    }
    const hm = line.match(/^(#{1,3})\s+(.*)/)
    if (hm) { closeAll(); out.push(`<h${hm[1].length}>${inline(hm[2])}</h${hm[1].length}>`); continue }
    const ulm = line.match(/^[-*]\s+(.*)/)
    if (ulm) {
      if (inOl) { out.push('</ol>'); inOl = false }
      if (inTable) closeAll()
      if (!inUl) { out.push('<ul>'); inUl = true }
      out.push(`<li>${inline(ulm[1])}</li>`); continue
    }
    const olm = line.match(/^\d+\.\s+(.*)/)
    if (olm) {
      if (inUl) { out.push('</ul>'); inUl = false }
      if (inTable) closeAll()
      if (!inOl) { out.push('<ol>'); inOl = true }
      out.push(`<li>${inline(olm[1])}</li>`); continue
    }
    if (line.trim() === '') { closeAll(); continue }
    closeAll()
    out.push(`<p>${inline(line)}</p>`)
  }
  closeAll()
  return out.join('\n').replace(/\x00B(\d+)\x00/g, (_, i) => blocks[parseInt(i)])
}

  })

  monacoEditor.addCommand(monaco.KeyMod.CtrlCmd | monaco.KeyCode.Enter, () => {

  })

  // Auto-render on change (debounced, MdArt + Markdown modes only)
  monacoEditor.onDidChangeModelContent(() => {

      document.getElementById('btn-apply').disabled = !isDirty
      return
    }
    clearTimeout(renderTimer)
    renderTimer = setTimeout(() => dispatchRender(false), 500)
  })

  // Restore chat history
  renderHistory()

  // Hide loading overlay
  document.getElementById('loading-overlay').style.display = 'none'

  // Set initial mode + render
  setMode('mdart')
  renderMdArt(false)

  // Populate example select for initial mode
  populateExampleSelect()
})
