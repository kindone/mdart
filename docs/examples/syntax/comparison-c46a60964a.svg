f0" font-family="system-ui,sans-serif">Vertical</text><text x="325" y="131" text-anchor="middle" font-size="11" fill="#e2e8f0" font-family="system-ui,sans-serif">Horizontal</text><text x="455" y="131" text-anchor="middle" font-size="11" fill="#e2e8f0" font-family="system-ui,sans-serif">In-memory</text><line x1="0" y1="144" x2="520" y2="144" stroke="#1e3050" stroke-width="0.5" /><rect x="0" y="144" width="130" height="36" fill="#1d4ed8" /><text x="65" y="167" text-anchor="middle" font-size="12" fill="#bfdbfe" font-family="system-ui,sans-serif" font-weight="700">Best for</text><rect x="130" y="144" width="390" height="36" fill="#0d1828" /><text x="195" y="167" text-anchor="middle" font-size="11" fill="#e2e8f0" font-family="system-ui,sans-serif">OLTP / analytics</text><text x="325" y="167" text-anchor="middle" font-size="11" fill="#e2e8f0" font-family="system-ui,sans-serif">Flexible schemas</text><text x="455" y="167" text-anchor="middle" font-size="11" fill="#e2e8f0" font-family="system-ui,sans-serif">Caching / sessions</text><line x1="0" y1="180" x2="520" y2="180" stroke="#1e3050" stroke-width="0.5" /><line x1="130" y1="40" x2="130" y2="180" stroke="#1e3050" stroke-width="0.5" /><line x1="260" y1="40" x2="260" y2="180" stroke="#1e3050" stroke-width="0.5" /><line x1="390" y1="40" x2="390" y2="180" stroke="#1e3050" stroke-width="0.5" /><line x1="520" y1="40" x2="520" y2="180" stroke="#1e3050" stroke-width="0.5" /><line x1="130" y1="40" x2="130" y2="180" stroke="#1e3050" stroke-width="1" />
