<svg viewBox="0 0 500 400" xmlns="http://www.w3.org/2000/svg" style="width:100%;height:auto">
    <rect width="500" height="400" fill="#080f18" rx="8"/>
    <text x="250" y="24" text-anchor="middle" font-size="13" fill="#e2e8f0" font-family="system-ui,sans-serif" font-weight="700">Market Entry</text><rect x="0" y="26" width="250" height="187" fill="#064e3b" /><text x="125" y="48" text-anchor="middle" font-size="12" fill="#6ee7b7" font-family="system-ui,sans-serif" font-weight="700">Strengths</text><text x="10" y="64" font-size="10" fill="#6ee7b7" font-family="system-ui,sans-serif" opacity="0.85">• Strong engineering team</text><text x="10" y="80" font-size="10" fill="#6ee7b7" font-family="system-ui,sans-serif" opacity="0.85">• Low infrastructure cost</text><rect x="250" y="26" width="250" height="187" fill="#4c0519" /><text x="375" y="48" text-anchor="middle" font-size="12" fill="#fda4af" font-family="system-ui,sans-serif" font-weight="700">Weaknesses</text><text x="260" y="64" font-size="10" fill="#fda4af" font-family="system-ui,sans-serif" opacity="0.85">• Limited brand recognition</text><text x="260" y="80" font-size="10" fill="#fda4af" font-family="system-ui,sans-serif" opacity="0.85">• Small sales force</text><rect x="0" y="213" width="250" height="187" fill="#1e3a8a" /><text x="125" y="235" text-anchor="middle" font-size="12" fill="#93c5fd" font-family="system-ui,sans-serif" font-weight="700">Opportunities</text><text x="10" y="251" font-size="10" fill="#93c5fd" font-family="system-ui,sans-serif" opacity="0.85">• Emerging market segment</text><text x="10" y="267" font-size="10" fill="#93c5fd" font-family="system-ui,sans-serif" opacity="0.85">• Partnership opportunities</text><rect x="250" y="213" width="250" height="187" fill="#451a03" /><text x="375" y="235" text-anchor="middle" font-size="12" fill="#fcd34d" font-family="system-ui,sans-serif" font-weight="700">Threats</text><text x="260" y="251" font-size="10" fill="#fcd34d" font-family="system-ui,sans-serif" opacity="0.85">• Established incumbents</text><text x="260" y="267" font-size="10" fill="#fcd34d" font-family="system-ui,sans-serif" opacity="0.85">• Regulatory uncertainty</text><line x1="250" y1="26" x2="250" y2="400" stroke="#080f18" stroke-width="2" /><line x1="0" y1="213" x2="500" y2="213" stroke="#080f18" stroke-width="2" />
  </svg>