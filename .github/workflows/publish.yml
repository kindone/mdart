name: Publish

on:
  push:
    tags:
      - 'v*'          # trigger on version tags: v0.1.0, v1.2.3, etc.

jobs:
  publish-npm:
    name: Publish to npm
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Run tests
        run: npm run test:all

      - name: Build packages
        run: npm run build

      - name: Publish mdart
        run: npm publish --workspace=packages/mdart --access=public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish mdart-marked
        run: npm publish --workspace=packages/mdart-marked --access=public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish mdart-markdown-it
        run: npm publish --workspace=packages/mdart-markdown-it --access=public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish mdart-remark
        run: npm publish --workspace=packages/mdart-remark --access=public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  publish-vscode:
    name: Publish VS Code extension
    runs-on: ubuntu-latest
    needs: publish-npm     # wait for npm so the extension can install published deps

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Build extension
        run: npm run build --workspace=apps/vscode

      - name: Publish to VS Code Marketplace
        run: npm run publish --workspace=apps/vscode
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
