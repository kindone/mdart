name: Publish

on:
  push:
    tags:
      - 'v*'          # trigger on version tags: v0.1.0, v1.2.3, etc.

jobs:
  publish-npm:
    name: Publish to npm
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Run tests
        run: npm run test:all

      - name: Build packages
        run: npm run build

      - name: Publish mdart
        run: npm publish --workspace=packages/mdart --access=public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish mdart-marked
        run: npm publish --workspace=packages/mdart-marked --access=public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish mdart-markdown-it
        run: npm publish --workspace=packages/mdart-markdown-it --access=public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish mdart-remark
        run: npm publish --workspace=packages/mdart-remark --access=public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

# Note: VS Code Marketplace publishing is not wired up in CI. When a
# publisher account + VSCE_PAT are ready, add a publish-vscode job that
# runs `npm run publish --workspace=apps/vscode` with VSCE_PAT as an env.
